name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Vérifie les types (TypeScript)
        run: npx tsc --noEmit
      - name: Build (attrape les erreurs de build avant le déploiement)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""
