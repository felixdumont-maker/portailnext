    /* ── Embed polices ── précalculé une seule fois, réutilisé pour tous les exports ──
       html-to-image embarque les @font-face en data URI. Si on le laisse refaire ce travail
       à chaque rendu (ancien double-passage), une course async pouvait rasteriser AVANT que
       les woff2 soient prêts → fallback Impact → tout le texte sortait en gras à l'export
       alors que le preview restait correct. On résout tout l'embed UNE fois, puis on injecte
       la chaîne finie. */
    let _fontEmbedCSSCache = null;
    let _sameOriginFontsInjected = false;

    // Les @font-face Google sont chargées via un <link> CROSS-ORIGIN : html-to-image ne peut pas
    // lire leur cssRules (SecurityError) → il ne les embarque pas → l'export retombe sur Impact
    // (police lourde) = tout en gras. On fetch le CSS Google (CORS-OK) et on le réinjecte dans un
    // <style> SAME-ORIGIN : la lib peut alors lire les @font-face et embarquer les woff2 (gstatic CORS-OK).
    async function ensureSameOriginFontCSS() {
      if (_sameOriginFontsInjected) return;
      _sameOriginFontsInjected = true;
      const links = [...document.querySelectorAll('link[rel="stylesheet"]')]
        .filter(l => /fonts\.googleapis\.com/.test(l.href || ''));
      const parts = [];
      for (const l of links) {
        try {
          const res = await fetch(l.href, { mode: 'cors' });
          if (res.ok) parts.push(await res.text());
        } catch (e) { console.warn('[fonts] fetch CSS échoué', l.href, e); }
      }
      if (parts.length) {
        const style = document.createElement('style');
        style.setAttribute('data-embedded-fonts', '');
        style.textContent = parts.join('\n');
        document.head.appendChild(style);
        // Laisse le navigateur enregistrer les nouvelles @font-face
        try { await document.fonts.ready; } catch (e) {}
      }
    }

    async function getCachedFontEmbedCSS(el) {
      if (_fontEmbedCSSCache != null) return _fontEmbedCSSCache;
      await ensureSameOriginFontCSS();
      await document.fonts.ready;
      const css = await htmlToImage.getFontEmbedCSS(el);
      _fontEmbedCSSCache = css || '';   // '' = échec → on ne passera PAS fontEmbedCSS (sinon embed désactivé)
      return _fontEmbedCSSCache;
    }

    /* ── Export PNG ── capture le stage déjà rendu (ref React) ── */
    async function exportPNG(id, tmpl, stageEl) {
      if (!stageEl) { alert('Stage introuvable.'); return; }
      if (typeof htmlToImage === 'undefined') { alert('Librairie d\'export non chargée.'); return; }

      const btn = document.activeElement instanceof HTMLButtonElement ? document.activeElement : null;
      const origLabel = btn?.innerHTML;
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-dl-icon">…</span>Export…'; }

      try {
        // Injecte les @font-face same-origin + résout l'embed en amont (cf. getCachedFontEmbedCSS).
        const fontEmbedCSS = await getCachedFontEmbedCSS(stageEl);

        const exportOpts = {
          pixelRatio: 3,
          width:      tmpl.w,
          height:     tmpl.h,
          style: {
            transform:  'none',
            position:   'static',
            left:       '0',
            top:        '0',
            boxShadow:  'none',
          },
        };
        // Ne passer fontEmbedCSS que s'il est non vide — une chaîne vide DÉSACTIVE l'embed dans la lib.
        if (fontEmbedCSS) exportOpts.fontEmbedCSS = fontEmbedCSS;

        const dataUrl = await htmlToImage.toPng(stageEl, exportOpts);

        if (!dataUrl || dataUrl.length < 500) {
          alert('Export vide — vérifiez la console.');
          return;
        }

        const prefix   = id.startsWith('R') ? 'royal' : 'cocktail';
        const ts       = new Date().toISOString().slice(0, 19).replaceAll(':', '-');
        const filename = `${prefix}-${id}-${ts}.png`;

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (isIOS) {
          // iOS Safari ignore l'attribut download — ouvre dans un nouvel onglet
          const w = window.open('', '_blank');
          if (w) {
            w.document.write(
              `<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1">` +
              `<style>body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100svh;gap:16px;}` +
              `img{max-width:100%;max-height:80svh;display:block;}` +
              `p{font-family:system-ui,sans-serif;color:rgba(255,255,255,.65);font-size:14px;text-align:center;padding:0 20px;line-height:1.6;}</style></head>` +
              `<body><img src="${dataUrl}"><p>Appuyez longuement sur l'image · Enregistrer dans Photos</p></body></html>`
            );
            w.document.close();
          }
        } else {
          // Blob URL — plus fiable que data: pour le téléchargement sur Android/desktop
          const blob   = dataUrlToBlob(dataUrl);
          const blobUrl = URL.createObjectURL(blob);
          const a      = document.createElement('a');
          a.href       = blobUrl;
          a.download   = filename;
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(blobUrl); }, 500);
        }

      } catch (e) {
        console.error('[exportPNG]', e);
        alert(`Erreur export : ${e.message}`);
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = origLabel; }
      }
    }

    function dataUrlToBlob(dataUrl) {
      const [header, b64] = dataUrl.split(',');
      const mime = header.match(/:(.*?);/)[1];
      const bytes = atob(b64);
      const arr = new Uint8Array(bytes.length);
      for (let j = 0; j < bytes.length; j++) arr[j] = bytes.charCodeAt(j);
      return new Blob([arr], { type: mime });
    }

    async function exportBatchE10B(quotes, sharedData, onProgress) {
      if (!quotes.length) return;
      if (typeof JSZip === 'undefined') { alert('JSZip non chargé — rechargez la page.'); return; }
      if (typeof htmlToImage === 'undefined') { alert('Librairie export non chargée.'); return; }
      if (typeof window.E10PolichinelleB === 'undefined') { alert('Template E10B non chargé.'); return; }

      const tmpl = TMPLS.find(t => t.id === 'E10B');
      if (!tmpl) { alert('Template E10B introuvable.'); return; }

      const zip = new JSZip();
      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;left:-9999px;top:0;pointer-events:none;';
      document.body.appendChild(container);
      const root = ReactDOM.createRoot(container);

      try {
        for (let i = 0; i < quotes.length; i++) {
          const numbered = sharedData._lotNumbered !== false;
          const prefix = sharedData._lotEyebrow || sharedData.eyebrow || 'CARNET · DICTON DE SALON';
          const itemData = {
            ...sharedData,
            quote: quotes[i],
            eyebrow: numbered ? `${prefix} · #${String(i + 1).padStart(2, '0')}` : prefix,
          };

          await new Promise(resolve => {
            root.render(
              React.createElement('div', { style: { width: tmpl.w, height: tmpl.h, position: 'relative' } },
                React.createElement(window.E10PolichinelleB, { data: itemData })
              )
            );
            // Attendre fonts + 2 frames de peinture avant capture
            document.fonts.ready.then(() => requestAnimationFrame(() => requestAnimationFrame(resolve)));
          });

          const el = container.firstChild;
          const fontEmbedCSS = await getCachedFontEmbedCSS(el);
          const batchOpts = {
            pixelRatio: 2,
            width: tmpl.w,
            height: tmpl.h,
            style: { transform: 'none', position: 'static', left: '0', top: '0', boxShadow: 'none' },
          };
          if (fontEmbedCSS) batchOpts.fontEmbedCSS = fontEmbedCSS;
          const dataUrl = await htmlToImage.toPng(el, batchOpts);

          zip.file(`secret-${String(i + 1).padStart(2, '0')}.png`, dataUrlToBlob(dataUrl));
          onProgress(i + 1, quotes.length);
        }

        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(zipBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `secrets-lot-${new Date().toISOString().slice(0, 10)}.zip`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
      } catch (e) {
        console.error('[exportBatchE10B]', e);
        alert(`Erreur export lot : ${e.message}`);
      } finally {
        root.unmount();
        document.body.removeChild(container);
      }
    }

    /* ── App ── */
    // Stage isolé + mémoïsé : ne se re-rend QUE si le template ou ses données changent.
    // Évite de repeindre l'aperçu 1080×1080 (12 images base64 + dégradés) à chaque frappe / zoom.
    const StageContent = React.memo(function StageContent({ tmpl, data }) {
      return tmpl.render(data);
    });

    function App() {
      const [active, setActive]           = useState('T01');
      const [tab, setTab]                 = useState('preview'); // mobile tabs
      const [scale, setScale]             = useState(0.5);
      const [data, setData]               = useState(() => {
        const base = clone(DEFAULTS);
        try {
          const saved = localStorage.getItem('cocktail_r10');
          if (saved) base.R10 = JSON.parse(saved);
        } catch(e) {}
        return base;
      });
      const [allowedIds, setAllowedIds]   = useState(null); // null = tous visibles
      const wrapRef  = useRef();
      const stageRef = useRef();

      // Saisie fluide : l'éditeur met `data` à jour immédiatement, mais l'aperçu lourd
      // est rendu à partir d'une version DIFFÉRÉE (priorité basse, interruptible).
      const deferredData = React.useDeferredValue(data);

      // Charger la config d'accès (admin = null, pigiste = liste restreinte)
      useEffect(() => {
        fetch('/api/v1/tools/config', { credentials: 'include' })
          .then(r => r.ok ? r.json() : null)
          .then(cfg => {
            if (cfg && cfg.social) setAllowedIds(cfg.social);
          })
          .catch(() => {});
      }, []);

      // Filtrer TMPLS selon les droits
      const visibleTmpls = allowedIds ? TMPLS.filter(t => allowedIds.includes(t.id)) : TMPLS;

      // Si le template actif n'est plus visible, passer au premier visible
      useEffect(() => {
        if (visibleTmpls.length > 0 && !visibleTmpls.find(t => t.id === active)) {
          setActive(visibleTmpls[0].id);
        }
      }, [allowedIds]);

      const tmpl = visibleTmpls.find(t => t.id === active) || visibleTmpls[0];

      const adjustZoom = (delta) => {
        setScale(s => Math.min(1.5, Math.max(0.1, Math.round((s + delta) * 20) / 20)));
      };

      useEffect(() => {
        function fit() {
          if (!wrapRef.current || !tmpl) return;
          const r = wrapRef.current.getBoundingClientRect();
          setScale(Math.min((r.width - 80) / tmpl.w, (r.height - 80) / tmpl.h, 1));
        }
        fit();
        window.addEventListener('resize', fit);
        const ro = new ResizeObserver(fit);
        if (wrapRef.current) ro.observe(wrapRef.current);
        return () => { window.removeEventListener('resize', fit); ro.disconnect(); };
      }, [active]);

      // Thème Xtreme / Royal
      useEffect(() => {
        const isX = data[active]?._team === 'xtreme';
        const root = document.documentElement;
        if (isX) {
          root.style.setProperty('--brand',      '#FFC702');
          root.style.setProperty('--brand-dim',  '#d4a800');
          root.style.setProperty('--brand-glow', 'rgba(255,199,2,0.18)');
        } else {
          root.style.removeProperty('--brand');
          root.style.removeProperty('--brand-dim');
          root.style.removeProperty('--brand-glow');
        }
      }, [active, data[active]?._team]);

      // Auto-save R10 to localStorage whenever its data changes
      const r10Json = JSON.stringify(data.R10);
      useEffect(() => {
        try { localStorage.setItem('cocktail_r10', r10Json); } catch(e) {}
      }, [r10Json]);

      const reset = () => {
        if (active === 'R10') { try { localStorage.removeItem('cocktail_r10'); } catch(e) {} }
        setData({ ...data, [active]: clone(DEFAULTS[active]) });
      };

      // Sélection template : passe automatiquement au preview sur mobile
      const selectTemplate = (id) => { setActive(id); setTab('preview'); };

      return (
        <div className="shell">

          {/* Annonce accessibilité — lecteur d'écran */}
          <div aria-live="polite" aria-atomic="true" style={{position:'absolute',width:1,height:1,overflow:'hidden',clip:'rect(0,0,0,0)',whiteSpace:'nowrap'}}>
            {tmpl ? `Template actif : ${tmpl.label}` : ''}
          </div>

          {/* ── Nav ── */}
          <nav className={`nav${tab === 'nav' ? ' mob-show' : ' mob-hide'}`}>
            <div className="nav-brand">
              <div className="nav-wordmark">Social Kit</div>
              <div className="nav-badge">
                <span className="nav-badge-pip" />
                Cocktail Média · Royal
              </div>
            </div>
            <ul className="nav-list">
              <li>
                <div className="nav-section-label" style={{padding:'10px 4px 4px'}}>Cocktail Média</div>
              </li>
              {visibleTmpls.filter(t => !t.brand).map((t, i) => (
                <li key={t.id}>
                  <button className={`nav-btn ${t.id === active ? 'active' : ''}`} onClick={() => selectTemplate(t.id)}>
                    <span className="n-num">{String(i + 1).padStart(2, '0')}</span>
                    <span className="n-label">{t.label}</span>
                    <span className="n-ratio">{t.ratio}</span>
                  </button>
                </li>
              ))}
              <li>
                <div className="nav-section-label" style={{padding:'12px 4px 4px',borderTop:'1px solid var(--border)',marginTop:6}}>Royal de Shawinigan</div>
              </li>
              {visibleTmpls.filter(t => t.brand === 'royal').map((t, i) => (
                <li key={t.id}>
                  <button className={`nav-btn ${t.id === active ? 'active' : ''}`} onClick={() => selectTemplate(t.id)}>
                    <span className="n-num">{String(i + 1).padStart(2, '0')}</span>
                    <span className="n-label">{t.label}</span>
                    <span className="n-ratio">{t.ratio}</span>
                  </button>
                </li>
              ))}
              <li>
                <div className="nav-section-label" style={{padding:'12px 4px 4px',borderTop:'1px solid var(--border)',marginTop:6}}>Templates généraux</div>
              </li>
              {visibleTmpls.filter(t => t.brand === 'generaux').map((t, i) => (
                <li key={t.id}>
                  <button className={`nav-btn ${t.id === active ? 'active' : ''}`} onClick={() => selectTemplate(t.id)}>
                    <span className="n-num">{String(i + 1).padStart(2, '0')}</span>
                    <span className="n-label">{t.label}</span>
                    <span className="n-ratio">{t.ratio}</span>
                  </button>
                </li>
              ))}
              <li>
                <div className="nav-section-label" style={{padding:'12px 4px 4px',borderTop:'1px solid var(--border)',marginTop:6}}>Beauté / Salon</div>
              </li>
              {visibleTmpls.filter(t => t.brand === 'salon').map((t, i) => (
                <li key={t.id}>
                  <button className={`nav-btn ${t.id === active ? 'active' : ''}`} onClick={() => selectTemplate(t.id)}>
                    <span className="n-num">{String(i + 1).padStart(2, '0')}</span>
                    <span className="n-label">{t.label}</span>
                    <span className="n-ratio">{t.ratio}</span>
                  </button>
                </li>
              ))}
            </ul>
            <div className="nav-status">
              <span className="nav-status-dot" />
              <span className="nav-status-text">{tmpl.w} × {tmpl.h}</span>
            </div>
          </nav>

          {/* ── Editor (wrapped pour mobile) ── */}
          <div className={`ed-wrap${tab === 'edit' ? ' mob-show' : ' mob-hide'}`}>
            <Panel
              active={active}
              data={data}
              setData={setData}
              onReset={reset}
              onExport={() => exportPNG(active, tmpl, stageRef.current)}
            />
          </div>

          {/* ── Stage ── */}
          <main className="stage-wrap" ref={wrapRef}>
            <div ref={stageRef} className="stage-canvas" style={{
              transform: `translate(-50%,-50%) scale(${scale})`,
              width: tmpl.w,
              height: tmpl.h,
            }}>
              <StageContent tmpl={tmpl} data={deferredData} />
            </div>
            <div className="stage-hud">
              <div className="hud-pip" />
              <div className="hud-cell">{tmpl.w} × {tmpl.h}</div>
              <div className="hud-divider" />
              <button className="hud-zoom-btn" aria-label="Réduire le zoom" onClick={() => adjustZoom(-0.05)}>−</button>
              <div className="hud-cell hud-accent" style={{ minWidth: '3.2em', textAlign: 'center' }} aria-live="polite" aria-atomic="true">{Math.round(scale * 100)}%</div>
              <button className="hud-zoom-btn" aria-label="Augmenter le zoom" onClick={() => adjustZoom(0.05)}>+</button>
              <div className="hud-divider" />
              <div className="hud-cell">{tmpl.ratio}</div>
            </div>
            {/* Bouton téléchargement flottant — mobile seulement */}
            <button className="mob-dl-btn" aria-label="Télécharger le template en PNG" onClick={() => exportPNG(active, tmpl, stageRef.current)}>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v13m0 0-4-4m4 4 4-4M3 21h18"/></svg>
              Télécharger
            </button>
          </main>

          {/* ── Tab bar mobile ── */}
          <div className="mob-tabs">
            <button className={`mob-tab${tab === 'nav' ? ' active' : ''}`} onClick={() => setTab('nav')}>
              <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="2.5" rx="1.2"/><rect x="3" y="11" width="18" height="2.5" rx="1.2"/><rect x="3" y="17" width="12" height="2.5" rx="1.2"/></svg>
              Templates
            </button>
            <button className={`mob-tab${tab === 'preview' ? ' active' : ''}`} onClick={() => setTab('preview')}>
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
              Aperçu
            </button>
            <button className={`mob-tab${tab === 'edit' ? ' active' : ''}`} onClick={() => setTab('edit')}>
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Éditer
            </button>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
