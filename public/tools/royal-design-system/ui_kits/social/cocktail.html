  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       oklch(52% 0.21 32);
      --brand-dim:   oklch(42% 0.18 32);
      --brand-glow:  oklch(52% 0.21 32 / 0.18);

      --bg-nav:      oklch(11% 0.012 35);
      --bg-editor:   oklch(16% 0.013 36);
      --bg-input:    oklch(12% 0.011 37);
      --bg-stage:    oklch(10% 0.010 37);
      --bg-hud:      oklch(18% 0.013 36);

      --border:      oklch(22% 0.010 40);
      --border-soft: oklch(18% 0.010 38);

      --text-hi:   oklch(88% 0.015 65);
      --text-mid:  oklch(56% 0.010 52);
      --text-lo:   oklch(36% 0.008 48);
      --text-xlo:  oklch(26% 0.008 44);

      --font-d: 'Bricolage Grotesque', 'Arial Black', sans-serif;
      --font-b: 'Atkinson Hyperlegible', Arial, sans-serif;

      --r: 7px;
      --ease: cubic-bezier(0.25, 1, 0.5, 1);
      --mob-tab-h: 58px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg-stage); }
    body { font-family: var(--font-b); -webkit-font-smoothing: antialiased; }

    /* ════════════════════════════════════════
       SHELL
    ════════════════════════════════════════ */
    .shell {
      display: grid;
      grid-template-columns: 220px 308px 1fr;
      height: 100dvh;
    }

    /* ════════════════════════════════════════
       NAV
    ════════════════════════════════════════ */
    .nav {
      background: var(--bg-nav);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    .nav-brand {
      padding: 16px 14px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .nav-wordmark {
      font-family: var(--font-d);
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.01em;
      color: var(--text-hi);
      line-height: 1;
      margin-bottom: 4px;
    }

    .nav-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-b);
      font-size: 0.56rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .nav-badge-pip {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--brand);
      flex-shrink: 0;
    }

    .nav-section-label {
      padding: 12px 14px 6px;
      font-family: var(--font-b);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-xlo);
      flex-shrink: 0;
    }

    .nav-list {
      list-style: none;
      padding: 4px 8px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .nav-btn {
      width: 100%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: grid;
      grid-template-columns: 18px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: var(--r);
      text-align: left;
      transition: background 100ms;
    }

    .nav-btn:hover { background: oklch(20% 0.010 38); }
    .nav-btn:hover .n-label { color: var(--text-hi); }
    .nav-btn:hover .n-num   { color: var(--text-mid); }
    .nav-btn:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

    .nav-btn.active { background: var(--brand); }
    .nav-btn.active .n-num   { color: oklch(84% 0.08 32); }
    .nav-btn.active .n-label { color: white; }
    .nav-btn.active .n-ratio { background: var(--brand-dim); color: oklch(88% 0.06 32); }

    .n-num {
      font-family: var(--font-b);
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--text-xlo);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .n-label {
      font-family: var(--font-d);
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.025em;
      text-transform: uppercase;
      color: var(--text-mid);
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .n-ratio {
      font-family: var(--font-b);
      font-size: 0.52rem;
      font-weight: 700;
      color: var(--text-xlo);
      background: oklch(18% 0.010 40);
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .nav-status {
      padding: 11px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--brand);
      flex-shrink: 0;
    }

    .nav-status-text {
      font-family: var(--font-b);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-lo);
    }

    /* ════════════════════════════════════════
       EDITOR
    ════════════════════════════════════════ */
    .editor {
      background: var(--bg-editor);
      border-right: 1px solid var(--border);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .ed-head {
      padding: 15px 16px 13px;
      border-bottom: 1px solid var(--border-soft);
      flex-shrink: 0;
    }

    .ed-title {
      font-family: var(--font-d);
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--text-hi);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .ed-hint {
      font-family: var(--font-b);
      font-size: 0.75rem;
      color: var(--text-lo);
      line-height: 1.55;
    }

    .ed-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .ed-scroll::-webkit-scrollbar { width: 3px; }
    .ed-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Field */
    .field {
      margin-bottom: 12px;
    }

    .field-group {
      margin-bottom: 12px;
    }

    .field-sep {
      height: 1px;
      background: var(--border-soft);
      margin: 14px 0;
    }

    .f-label {
      display: block;
      font-family: var(--font-b);
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--text-lo);
      margin-bottom: 5px;
    }

    .f-input, .f-textarea, .f-select {
      display: block;
      width: 100%;
      background: var(--bg-input);
      color: var(--text-hi);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 8px 10px;
      font-family: var(--font-b);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 100ms, box-shadow 100ms;
      line-height: 1.5;
    }

    .f-input:hover, .f-textarea:hover, .f-select:hover {
      border-color: oklch(30% 0.010 42);
    }

    .f-input:focus, .f-textarea:focus, .f-select:focus,
    .f-input:focus-visible, .f-textarea:focus-visible, .f-select:focus-visible {
      border-color: var(--brand);
      box-shadow: 0 0 0 2.5px var(--brand-glow);
      outline: 2px solid var(--brand);
      outline-offset: 1px;
    }

    .f-input[type="file"] {
      padding: 6px 10px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .f-textarea {
      min-height: 66px;
      resize: vertical;
      line-height: 1.5;
    }

    .f-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .ed-actions {
      padding: 14px 16px;
      border-top: 1px solid var(--border-soft);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .btn-primary {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 11px 14px;
      cursor: pointer;
      font-family: var(--font-d);
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--brand);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: opacity 100ms, transform 80ms var(--ease);
    }

    .btn-primary:hover  { opacity: 0.87; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-dl-icon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: oklch(42% 0.18 32);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }

    .btn-secondary {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-family: var(--font-b);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: transparent;
      color: var(--text-lo);
      transition: border-color 100ms, color 100ms, background 100ms;
    }

    .btn-secondary:hover {
      border-color: oklch(30% 0.010 42);
      color: var(--text-mid);
      background: oklch(20% 0.010 38);
    }

    .btn-text {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-b);
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-lo);
      padding: 6px 0;
      text-align: center;
      width: 100%;
      transition: color 100ms;
    }

    .btn-text:hover { color: var(--brand); }

    /* ════════════════════════════════════════
       STAGE
    ════════════════════════════════════════ */
    .stage-wrap {
      position: relative;
      overflow: hidden;
      background-color: var(--bg-stage);
      /* Figma-style crosshatch grid */
      background-image:
        linear-gradient(var(--border-soft) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-soft) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .stage-canvas {
      position: absolute;
      left: 50%;
      top: 50%;
      box-shadow:
        0 0 0 1px oklch(28% 0.010 42),
        0 2px 4px oklch(0% 0 0 / 0.4),
        0 16px 64px oklch(0% 0 0 / 0.7),
        0 40px 120px oklch(0% 0 0 / 0.4);
      overflow: hidden;
      transform-origin: center;
    }

    .stage-hud {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg-hud);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      pointer-events: auto;
      white-space: nowrap;
      font-family: var(--font-b);
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }

    .hud-zoom-btn {
      width: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text-mid);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      padding: 7px 0;
      transition: color 100ms, background 100ms;
    }

    .hud-zoom-btn:hover {
      color: var(--brand);
      background: oklch(22% 0.010 40);
    }

    .hud-cell {
      padding: 6px 12px;
      color: var(--text-lo);
    }

    .hud-accent {
      color: var(--brand);
    }

    .hud-divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      flex-shrink: 0;
    }

    .hud-pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      margin-left: 4px;
      flex-shrink: 0;
    }

    /* ════════════════════════════════════════
       ED-WRAP — transparent on desktop (display:contents),
       becomes a positioned panel on mobile
    ════════════════════════════════════════ */
    .ed-wrap { display: contents; }

    /* hidden on desktop, shown on mobile */
    .mob-tabs   { display: none; }
    .mob-dl-btn { display: none; }

    /* ════════════════════════════════════════
       MOBILE  ≤ 767px
    ════════════════════════════════════════ */
    @media (max-width: 767px) {

      /* Shell becomes a simple block — panels are fixed */
      .shell {
        display: block;
        height: 100dvh;
        overflow: hidden;
      }

      /* All three panels: fixed, fill viewport above tab bar */
      .nav,
      .ed-wrap,
      .stage-wrap {
        position: fixed;
        inset: 0;
        bottom: var(--mob-tab-h);
        border-right: none;
        height: auto;
        z-index: 10;
      }

      /* Nav tweaks */
      .nav { border-bottom: 1px solid var(--border); }

      /* Editor wrapper: block, not contents */
      .ed-wrap { display: block; }
      .ed-wrap .editor { height: 100%; }

      /* Nav/editor panels slide under stage by default;
         when visible (.mob-show) they pop to z:20 */
      .nav.mob-show,
      .ed-wrap.mob-show { z-index: 20; }

      /* Hide inactive panels */
      .mob-hide { display: none !important; }

      /* Stage HUD: tighter bottom */
      .stage-hud { bottom: 10px; }

      /* ── Download FAB (visible only on preview tab) ── */
      .mob-dl-btn {
        display: flex;
        position: fixed;
        bottom: calc(var(--mob-tab-h) + 16px);
        right: 16px;
        z-index: 30;
        border: none;
        border-radius: 999px;
        background: var(--brand);
        color: #fff;
        font-family: var(--font-d);
        font-weight: 700;
        font-size: 0.75rem;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        padding: 12px 22px 12px 18px;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        box-shadow: 0 4px 24px oklch(0% 0 0 / 0.5);
        transition: opacity 100ms, transform 80ms var(--ease);
        -webkit-tap-highlight-color: transparent;
      }
      .mob-dl-btn:active { opacity: 0.82; transform: scale(0.97); }

      /* ── Bottom tab bar ── */
      .mob-tabs {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--mob-tab-h);
        background: var(--bg-nav);
        border-top: 1px solid var(--border);
        z-index: 100;
      }

      .mob-tab {
        flex: 1;
        border: none;
        background: transparent;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
        cursor: pointer;
        font-family: var(--font-b);
        font-size: 0.5rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-lo);
        padding: 6px 4px 8px;
        transition: color 100ms;
        -webkit-tap-highlight-color: transparent;
      }

      .mob-tab svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }

      .mob-tab.active { color: var(--brand); }

    } /* end @media mobile */
  </style>
</head>

  <script>
    window.__loadedFonts = new Set();
    window.loadTemplateFont = function(family) {
      if (!family || window.__loadedFonts.has(family)) return;
      window.__loadedFonts.add(family);
      const l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(family).replace(/%20/g,'+') + ':wght@400;700;900&display=swap';
      document.head.appendChild(l);
    };
    window.salonBgCss = function(data, fallback) {
      if (!data || !data._bgImage) return fallback;
      const c = (data._overlayColor || '#000000').replace('#', '');
      const r = parseInt(c.slice(0,2),16)||0, g = parseInt(c.slice(2,4),16)||0, b = parseInt(c.slice(4,6),16)||0;
      const o = (data._overlayOpacity !== undefined ? data._overlayOpacity : 0).toFixed(2);
      return `linear-gradient(rgba(${r},${g},${b},${o}),rgba(${r},${g},${b},${o})),url("${data._bgImage}") center/cover no-repeat`;
    };
  </script>

    const { useState, useEffect, useRef } = React;

    function hexToRgba(hex, alpha) {
      const h = hex.replace('#','');
      const r = parseInt(h.slice(0,2),16)||0;
      const g = parseInt(h.slice(2,4),16)||0;
      const b = parseInt(h.slice(4,6),16)||0;
      return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
    }

    function gWrap(id, data, children) {
      const d = data[id] || {};
      const p  = PALETTES_G[d._palette||'rouge'] || PALETTES_G.rouge;
      const brand  = d._brand  || p.brand;
      const deep   = d._deep   || p.deep;
      const accent = d._accent || p.accent;
      const fd  = d._font        || null;
      const fb  = d._fontBody    || null;
      const bgImg     = d._bgImage   || null;
      const bgOpacity = d._bgOpacity !== undefined ? d._bgOpacity : 0.35;
      let bgImageCss = 'none';
      if (bgImg) {
        const ov = hexToRgba(brand, 1 - bgOpacity);
        bgImageCss = `linear-gradient(${ov},${ov}),url("${bgImg}")`;
      }
      if (fb && typeof window.loadTemplateFont === 'function') {
        const m = fb.match(/^'([^']+)'/);
        if (m) window.loadTemplateFont(m[1]);
      }
      // Zones de couleur individuelles (surcharge les tokens.css)
      const zoneVars = {};
      if (d._glass)   zoneVars['--surface-darker'] = d._glass;
      if (d._card)    zoneVars['--surface-mid']    = d._card;
      if (d._ink)     zoneVars['--ink']            = d._ink;
      if (d._cream)   zoneVars['--cream']          = d._cream;
      if (d._textFg)  zoneVars['--fg-primary']     = d._textFg;

      if (d._accentShape) zoneVars['--accent']     = d._accentShape; // formes accent
      return (
        <div style={{'--brand':brand,'--brand-deep':deep,'--accent':accent,
          '--bg-image': bgImageCss,
          ...(fd ? {'--font-display':fd} : {}),
          ...(fb ? {'--font-body':fb}    : {}),
          ...zoneVars,
          width:1080,height:1080,overflow:'hidden',position:'relative'}}>
          {children}

    function FSponsorLogo({ label, value, onChange }) {
      const knownVals = SPONSOR_LOGO_OPTIONS.map(o => o.value);
      const isKnown   = knownVals.includes(value);
      const isData    = (value || '').startsWith('data:');
      return (
        <div className="field">
          <Lbl>{label}</Lbl>
          <select className="f-select" style={{marginBottom:6}}
            value={isKnown ? value : ''}
            onChange={e => { if (e.target.value) onChange(e.target.value); }}>
            <option value="">— Choisir un partenaire —</option>
            {SPONSOR_LOGO_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
          <input className="f-input" type="file" accept="image/*" style={{marginBottom:4}}
            onChange={e => { const f = e.target.files?.[0]; if (!f) return; const r = new FileReader(); r.onload = () => onChange(r.result); r.readAsDataURL(f); }} />
          {!isData && (
            <div style={{marginTop:4}}>
              <Lbl>Chemin manuel</Lbl>
              <input className="f-input" value={(!isKnown && value) ? value : ''} placeholder="./team-logos/logo.png"

            </div>
          )}
          {value && (
            <div style={{marginTop:8, display:'flex', alignItems:'center', gap:10}}>
              <div style={{height:36, maxWidth:120, borderRadius:6, background:'rgba(255,255,255,0.08)', padding:'4px 8px', display:'flex', alignItems:'center'}}>

              <button className="btn-text" type="button" style={{fontSize:'0.65rem', padding:'4px 0'}} onClick={() => onChange('')}>Retirer</button>
            </div>
          )}
        </div>
      );
    }

    function StylePanel({ d, set, zones }) {

      const setColor = (k, v) => set('colors', { ...colors, [k]: v });
      const setFont  = (k, v) => set('fonts',  { ...fonts,  [k]: v });
      const hasOverride = Object.keys(colors).length > 0;

      return (
        <>
          <div className="field">
            <Lbl>Couleurs</Lbl>
            {zones.map(z => {
              const val = colors[z.key] || '';

              return (
                <div key={z.key} style={{display:'grid', gridTemplateColumns:'1fr 32px minmax(0,1fr) 18px', gap:5, alignItems:'center', marginBottom:6}}>

                    onChange={e => setColor(z.key, e.target.value)} />
                  <input type="text" value={val} placeholder={z.def}

                </div>
              );

                );

              <option value="">— Choisir du roster —</option>

                <option key={`${starKey}-${r.num}-${r.lastName}`} value={`${r.firstName} ${r.lastName}`}>
                  {r.num ? `#${r.num} ` : ''}{r.firstName} {r.lastName}
                </option>
              ))}
            </select>
            <Row2>
              <div className="field" style={{margin:0}}>
                <Lbl>Nom affiché</Lbl>
                <input className="f-input" value={star.name||''} onChange={e=>setStar(starKey,'name',e.target.value)} placeholder="ex: A. VACHON" />
              </div>
              <div className="field" style={{margin:0}}>
                <Lbl>Numéro</Lbl>
                <input className="f-input" value={star.number||''} onChange={e=>setStar(starKey,'number',e.target.value)} placeholder="8" />
              </div>
            </Row2>
            <FInput label="Position / rôle" value={star.position||''} onChange={v=>setStar(starKey,'position',v)} placeholder="ex: GARDIENNE" />
            <FInput label="Stats (ligne)" value={star.stats||''} onChange={v=>setStar(starKey,'stats',v)} placeholder="ex: 2 buts · 1 passe" />
            {showPhoto && (
              <>
                <FImg label="Photo" value={star.photo||''} onChange={v=>setStar(starKey,'photo',v)} />
                <FInput label="Position photo (CSS)" value={star.photoPosition||''} onChange={v=>setStar(starKey,'photoPosition',v)} placeholder="center top" />
              </>
            )}
          </div>
        );
      };
      return (
        <EdShell id="R07" title="3 Étoiles" hint="1re étoile avec photo · 2e et 3e en cartes" onExport={onExport} onReset={onReset}>
          <TeamToggle d={d} set={set} xColors={{bg:'#062045',pillBg:'#FFC702',pillFg:'#062045'}} onSwitch={t=>{ set('eyebrow',t==='xtreme'?'XTREME DE SHAWINIGAN · LNHB':'ROYAL DE SHAWINIGAN · LNHBF'); if(t==='xtreme') set('_venue','home'); }} />
          <VenueToggle d={d} set={set} homeColors={{bg:'#062045',pillBg:'#FFC702',pillFg:'#062045'}} awayColors={{bg:'#FFC702',pillBg:'#062045',pillFg:'#FFC702'}} />
          <FInput label="Eyebrow" value={d.eyebrow||''} onChange={v=>set('eyebrow',v)} />
          <Row2>
            <FInput label="Titre ligne 1" value={d.heroLine1||''} onChange={v=>set('heroLine1',v)} />
            <FInput label="Titre ligne 2" value={d.heroLine2||''} onChange={v=>set('heroLine2',v)} />
          </Row2>
          <FInput label="Info match (date · centre)" value={d.matchInfo||''} onChange={v=>set('matchInfo',v)} />
          <Sep/>
          <StarBlock starKey="star1" rank={1} showPhoto={true} />
          <StarBlock starKey="star2" rank={2} showPhoto={false} />
          <StarBlock starKey="star3" rank={3} showPhoto={false} />
          <Sep/>
          <Row2>
            <FInput label="Footer gauche" value={d.footer?.left||''} onChange={v=>set('footer',{...(d.footer||{}),left:v})} />
            <FInput label="Footer droite" value={d.footer?.right||''} onChange={v=>set('footer',{...(d.footer||{}),right:v})} />
          </Row2>
          <Sep/>
          <Lbl>Logos partenaires</Lbl>
          {(d.sponsors||[]).map((sp,i)=>(
            <div key={i} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:10,marginBottom:6}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span className="f-label" style={{margin:0}}>Partenaire {i+1}</span>
                <button className="btn-text" type="button" style={{padding:'0 4px'}} onClick={()=>set('sponsors',(d.sponsors||[]).filter((_,j)=>j!==i))}>✕</button>
              </div>
              <FSponsorLogo label="Logo" value={sp.logo||''} onChange={v=>{const n=[...(d.sponsors||[])];n[i]={...n[i],logo:v};set('sponsors',n);}} />
            </div>
          ))}
          <button className="btn-secondary" style={{width:'100%',marginBottom:8}} type="button" onClick={()=>set('sponsors',[...(d.sponsors||[]),{name:'',logo:''}])}>+ Partenaire</button>
          <Sep/>
          <StylePanel d={d} set={set} zones={[
            { key:'bg',      label:'Fond principal',   def: isX?'#062045':'#d62127' },
            { key:'starBg',  label:'Cartes étoiles',   def:'rgba(255,255,255,0.07)' },
            { key:'photoBg', label:'Fond zone photo',  def:'#2a2a2a' },
            { key:'fg',      label:'Texte principal',  def:'#ffffff' },
            { key:'fgSub',   label:'Texte secondaire', def:'rgba(255,255,255,0.55)' },
          ]} />
        </EdShell>
      );
    }

    /* ── R10 — Classement de la ligue ── */
    function EdR10({ d, set, onExport, onReset }) {
      const isX = d._team === 'xtreme';
      const [importText, setImportText] = useState('');
      const [parsedRows,  setParsedRows] = useState(null);

      // Colonnes du classement officiel exporté :
      // GP | W | OTW | L | OTL | SOL | PTS | GF | GA | ...
      // PTS = (W-OTW)*2 + OTW*3 + OTL + SOL
      function parseStandings(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
        const result = [];
        for (let i = 0; i < lines.length; i++) {
          if (!/^\d+\./.test(lines[i])) continue;
          const nameLine  = lines[i + 1] || '';
          const statsLine = lines[i + 2] || '';
          if (!nameLine || /^\d/.test(nameLine)) continue;
          if (!/^\d/.test(statsLine)) continue;
          const name = nameLine.trim().toUpperCase();
          const cols = statsLine.trim().split(/[\t ]+/);
          const gp  = parseInt(cols[0]) || 0;
          const w   = parseInt(cols[1]) || 0;
          const l   = parseInt(cols[3]) || 0;
          const otl = (parseInt(cols[4]) || 0) + (parseInt(cols[5]) || 0);
          const pts = parseInt(cols[6]) || 0;
          result.push({ name, gp, w, l, otl, pts });
          i += 2;
        }
        return result;
      }

      function applyImport(rows) {
        const existing = d.teams || [];
        const updated = rows.map(row => {
          // Cherche l'équipe existante par correspondance de nom (pour garder le logo)
          const match = existing.find(e =>
            e.name.toLowerCase() === row.name.toLowerCase() ||
            e.name.toLowerCase().includes(row.name.toLowerCase().split(' ')[0]) ||
            row.name.toLowerCase().includes(e.name.toLowerCase().split(' ')[0])
          );
          return { logo: '', ...(match || {}), name: row.name, gp: row.gp, w: row.w, l: row.l, otl: row.otl, pts: row.pts };
        });
        set('teams', updated);
        setImportText('');
        setParsedRows(null);
      }

      function switchTeam(team) {
        const defaultTeams = team === 'xtreme'
          ? R10Classement.defaultTeamsXtreme
          : R10Classement.defaultTeamsRoyal;
        set('_team', team);
        set('colors', team === 'xtreme' ? { bg:'#062045', rowHlBorder:'#FFC702', ptsColor:'#FFC702' } : {});
        set('teams', defaultTeams.map(t => ({...t})));
        set('highlightTeam', team === 'xtreme' ? 'XTREME DE SHAWINIGAN' : 'ROYAL DE SHAWINIGAN');
        set('eyebrow', team === 'xtreme' ? 'LNHB · SAISON 2025-2026' : 'LNHBF · SAISON 2025-2026');
      }

      // Update multiple fields at once (fixes logo+name overwrite bug)
      const updateTeamFields = (i, fields) => {
        const t = [...(d.teams||[])];
        t[i] = { ...t[i], ...fields };
        if (d.autoSort) t.sort((a,b)=>(b.pts-a.pts)||(b.w-a.w)||(a.l-b.l));
        set('teams', t);
      };

      const updateTeam = (i, field, val) => {
        const prevName = (d.teams||[])[i]?.name;
        const t = [...(d.teams||[])];
        t[i] = { ...t[i], [field]: val };
        set('teams', t);
        if (field === 'name' && d.highlightTeam === prevName) set('highlightTeam', val);
      };

      const updatePts = (i, field, val) => {
        const t = [...(d.teams||[])]; t[i] = { ...t[i], [field]: isNaN(+val) ? 0 : +val };
        if (!d.autoSort) set('teams', t);
        else { t.sort((a,b)=>(b.pts-a.pts)||(b.w-a.w)||(a.l-b.l)); set('teams', t); }
      };

      const moveUp   = (i) => { if (i===0) return; const t=[...(d.teams||[])]; [t[i-1],t[i]]=[t[i],t[i-1]]; set('teams',t); };
      const moveDown = (i) => { const t=[...(d.teams||[])]; if(i>=t.length-1)return; [t[i],t[i+1]]=[t[i+1],t[i]]; set('teams',t); };

      const removeTeam = (i) => {
        const removedName = (d.teams||[])[i]?.name;
        const t = [...(d.teams||[])];
        t.splice(i, 1);
        set('teams', t);
        if (d.highlightTeam === removedName) set('highlightTeam', '');
      };

      const addTeam = () => {
        const t = [...(d.teams||[])];
        t.push({ name: 'NOUVELLE ÉQUIPE', logo: '', gp:0, w:0, l:0, otl:0, pts:0 });
        set('teams', t);
      };

      const uploadTeamLogo = (i, file) => {
        const r = new FileReader();
        r.onload = () => updateTeam(i, 'logo', r.result);
        r.readAsDataURL(file);
      };

      // Combined logo list — both leagues, with group headers
      const _M = './team-logos/logos-masculins/';
      const LOGOS_ALL = [
        {label:'— LNHBF · Féminin —',            value:'', disabled:true},
        {label:'Royal de Shawinigan',              value:'./team-logos/LogoLNHBF_Shawinigan.svg'},
        {label:'Anjou',                            value:'./team-logos/LogoLNHBF_Anjou.png'},
        {label:'Granby',                           value:'./team-logos/LogoLNHBF_Granby.png'},
        {label:'Joliette',                         value:'./team-logos/LogoLNHBF_Joliette.png'},
        {label:'Lévis',                            value:'./team-logos/LogoLNHBF_Levis.png'},
        {label:'Hawks de Mirabel',                 value:'./team-logos/Hawks-de-Mirabel.png'},
        {label:'Montréal',                         value:'./team-logos/LogoLNHBF_Montreal.png'},
        {label:'Sherbrooke',                       value:'./team-logos/LogoLNHBF_Sherbrooke.png'},
        {label:'St-Hubert',                        value:'./team-logos/LogoLNHBF_StHubert.png'},
        {label:'— LNHB · Masculin —',             value:'', disabled:true},
        {label:'Xtreme de Shawinigan',             value:_M+'Xtreme-de-Shawinigan.png'},
        {label:'Assurancia de Joliette',           value:_M+'Assurancia-de-Joliette.png'},
        {label:'Camping Île-Marie (Sherbrooke)',   value:_M+'Camping-Ile-Marie-du-CHBS.png'},
        {label:'Harfangs de Québec',               value:_M+'Harfangs-de-Quebec.png'},
        {label:'Hawks de Mirabel (M)',             value:_M+'Hawks-de-Mirabel.png'},
        {label:'Huskies DEK Anjou',                value:_M+'Huskies-DEK-Anjou.png'},
        {label:'GB DEK Boucherville',              value:_M+'LOGO_GB_DEK-Boucherville.png'},
        {label:'Lynx de Victoriaville',            value:_M+'Lynx-de-Victoriaville.png'},
        {label:'Mobux de McMasterville',           value:_M+'Mobux-de-McMasterville-3.png'},
        {label:'Prédateurs',                       value:_M+'Predateurs.jpg'},
        {label:'Prédateurs de Granby',             value:_M+'Predateurs-de-Granby.png'},
        {label:'Beauchemin Sorel-Tracy',           value:_M+'logo-beauchemin-sorel-tracy.png'},
        {label:'Titan de Laval',                   value:_M+'Titan-de-Laval.png'},
        {label:'PSL',                              value:_M+'PSL-NHLB-petite.png'},
      ];
      const knownLogoVals = LOGOS_ALL.filter(o=>o.value).map(o=>o.value);

      const teams = d.teams || [];

      return (
        <EdShell id="R10" title="Classement de la ligue" hint="Sauvegardé automatiquement · tri auto par PTS" onExport={onExport} onReset={onReset}>

          {/* Toggle ligue */}
          <div style={{display:'flex', gap:4, marginBottom:10}}>
            <button type="button"
              onClick={() => switchTeam('royal')}
              style={{flex:1,padding:'7px 4px',fontSize:'0.68rem',fontWeight:600,letterSpacing:'0.04em',
                border:`1.5px solid ${!isX?'var(--brand)':'var(--border)'}`,
                background:!isX?'var(--brand)':'transparent',color:!isX?'var(--text-hi)':'var(--text-mid)',
                borderRadius:'var(--r)',cursor:'pointer'}}>
              LNHBF ♀
            </button>
            <button type="button"
              onClick={() => switchTeam('xtreme')}
              style={{flex:1,padding:'7px 4px',fontSize:'0.68rem',fontWeight:600,letterSpacing:'0.04em',
                border:`1.5px solid ${isX?'var(--brand)':'var(--border)'}`,
                background:isX?'var(--brand)':'transparent',color:isX?'var(--text-hi)':'var(--text-mid)',
                borderRadius:'var(--r)',cursor:'pointer'}}>
              LNHB ♂
            </button>
          </div>

          <FInput label="Eyebrow" value={d.eyebrow||''} onChange={v=>set('eyebrow',v)} />
          <FInput label="Sous-titre" value={d.subtitle||''} placeholder={d._team==='xtreme'?'LNHB · MASCULIN':'LNHBF · FÉMININ'} onChange={v=>set('subtitle',v)} />
          <FInput label="Contexte semaine" value={d.weekContext||''} onChange={v=>set('weekContext',v)} />

          <Sep/>

          {/* Options */}
          <div className="field">
            <Lbl>Options</Lbl>
            <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}>
              <input type="checkbox" id="r10-autosort" checked={!!d.autoSort}
                onChange={e=>set('autoSort',e.target.checked)} style={{cursor:'pointer'}} />
              <label htmlFor="r10-autosort" style={{fontSize:'0.68rem',color:'var(--text-mid)',cursor:'pointer'}}>
                Trier automatiquement par points
              </label>
            </div>
            <Lbl>Équipe surlignée</Lbl>
            <select className="f-select" value={d.highlightTeam||''} onChange={e=>set('highlightTeam',e.target.value)}>
              <option value="">— Aucune —</option>
              {teams.map((t,i)=>(
                <option key={i} value={t.name}>{t.name}</option>
              ))}
            </select>
          </div>

          <Sep/>

          {/* ── Import rapide ── */}
          <div className="field">
            <Lbl>Import rapide — coller le classement officiel</Lbl>
            <textarea
              className="f-input"
              rows={7}
              placeholder={"1.\nRoyal de Shawinigan\n3    3    1    0    0    0    7    7    5    2 ...\n\n2.\nHawks de Mirabel\n3    2    2    0    0    1    7 ..."}
              value={importText}
              onChange={e => {
                const txt = e.target.value;
                setImportText(txt);
                const rows = parseStandings(txt);
                setParsedRows(rows.length > 0 ? rows : null);
              }}
              style={{fontFamily:'monospace', fontSize:'0.58rem', resize:'vertical', lineHeight:1.5}}
            />
            {parsedRows && (
              <div style={{marginTop:6}}>
                <div style={{fontSize:'0.62rem', color:'var(--text-mid)', marginBottom:6, letterSpacing:'0.04em'}}>
                  ✓ {parsedRows.length} équipe{parsedRows.length > 1 ? 's' : ''} détectée{parsedRows.length > 1 ? 's' : ''}
                  {' · '}
                  {parsedRows.map(r => r.name.split(' ')[0]).join(', ')}
                </div>
                <button type="button"
                  onClick={() => applyImport(parsedRows)}
                  style={{width:'100%', padding:'9px', fontSize:'0.70rem', fontWeight:700,
                    letterSpacing:'0.06em', textTransform:'uppercase',
                    background:'var(--brand)', border:'none', borderRadius:'var(--r)',
                    color:'var(--text-hi)', cursor:'pointer'}}>
                  Appliquer · {parsedRows.length} équipes
                </button>
              </div>
            )}
          </div>

          <Sep/>

          {/* Tableau des équipes */}
          <div className="field">
            <Lbl>Équipes · stats</Lbl>
            {teams.map((team, i) => (
              <div key={i} style={{
                background:'var(--bg-input)', border:'1px solid var(--border)',
                borderRadius:'var(--r)', padding:'6px 8px', marginBottom:4,
              }}>

                {/* Rangée: logo cliquable · dropdown · flèches · × */}
                <div style={{display:'flex',gap:5,alignItems:'center',marginBottom:5}}>
                  {/* Logo — clique pour uploader */}
                  <label htmlFor={`r10-logo-up-${i}`} title="Cliquer pour uploader" style={{cursor:'pointer',flexShrink:0}}>
                    <div style={{width:30,height:30,borderRadius:6,
                      background:'rgba(255,255,255,0.06)',border:'1px dashed rgba(255,255,255,0.22)',
                      display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
                      {team.logo
                        ? <img src={team.logo} alt="" style={{maxWidth:28,maxHeight:28,objectFit:'contain'}}/>
                        : <span style={{fontSize:13,color:'var(--text-lo)',lineHeight:1}}>+</span>}
                    </div>
                  </label>
                  <input type="file" accept="image/*" id={`r10-logo-up-${i}`} style={{display:'none'}}
                    onChange={e=>{const f=e.target.files?.[0]; if(f) uploadTeamLogo(i,f); e.target.value='';}} />

                  {/* Dropdown logos connus */}
                  <select className="f-select" style={{flex:1,fontSize:'0.62rem'}}
                    value={knownLogoVals.includes(team.logo)?team.logo:''}
                    onChange={e=>{
                      const opt=LOGOS_ALL.find(o=>o.value===e.target.value&&!o.disabled);
                      if(opt) updateTeamFields(i,{logo:opt.value, name:opt.label.toUpperCase()});
                    }}>
                    <option value="">— Choisir / uploader ↑ —</option>
                    {LOGOS_ALL.map((o,idx)=>(
                      <option key={idx} value={o.value} disabled={!!o.disabled}>{o.label}</option>
                    ))}
                  </select>

                  {/* Flèches ordre manuel */}
                  {!d.autoSort && (
                    <div style={{display:'flex',flexDirection:'column',gap:1,flexShrink:0}}>
                      <button type="button" onClick={()=>moveUp(i)}
                        style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-lo)',fontSize:9,padding:'1px 2px',lineHeight:1}}>▲</button>
                      <button type="button" onClick={()=>moveDown(i)}
                        style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-lo)',fontSize:9,padding:'1px 2px',lineHeight:1}}>▼</button>
                    </div>
                  )}

                  {/* Supprimer équipe */}
                  <button type="button" onClick={()=>removeTeam(i)} title="Supprimer cette équipe"
                    style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-lo)',
                      fontSize:17,lineHeight:1,padding:'0 2px',flexShrink:0}}>×</button>
                </div>

                {/* Nom de l'équipe */}
                <input className="f-input" value={team.name||''} placeholder="Nom de l'équipe"
                  onChange={e=>updateTeam(i,'name',e.target.value)}
                  style={{marginBottom:6,fontSize:'0.65rem',fontWeight:600}} />

                {/* Stats : PJ · V · D · DP · PTS */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:3}}>
                  {[['gp','PJ'],['w','V'],['l','D'],['otl','DP'],['pts','PTS']].map(([field,lbl])=>(
                    <div key={field}>
                      <div style={{fontSize:'0.50rem',fontWeight:700,letterSpacing:'0.10em',
                        color:'var(--text-lo)',textAlign:'center',marginBottom:2,textTransform:'uppercase'}}>{lbl}</div>
                      <input className="f-input" type="number" min="0"
                        value={team[field]??''} placeholder="0"
                        onChange={e=>updatePts(i,field,e.target.value)}
                        style={{textAlign:'center',fontSize:'0.65rem',padding:'3px 2px'}}/>
                    </div>
                  ))}
                </div>
              </div>
            ))}

            {/* Ajouter une équipe */}
            <button type="button" onClick={addTeam}
              style={{width:'100%',padding:'8px',fontSize:'0.68rem',fontWeight:600,letterSpacing:'0.04em',
                background:'none',border:'1px dashed var(--border)',borderRadius:'var(--r)',
                color:'var(--text-mid)',cursor:'pointer',marginTop:4}}>
              ＋ Ajouter une équipe
            </button>
          </div>

          <Sep/>
          <Row2>
            <FInput label="Footer gauche" value={d.footerLeft||''} onChange={v=>set('footerLeft',v)} />
            <FInput label="Footer droite" value={d.footerRight||''} onChange={v=>set('footerRight',v)} />
          </Row2>
          <Sep/>
          <Lbl>Logos partenaires</Lbl>
          {(d.sponsors||[]).map((sp,i)=>(
            <div key={i} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:10,marginBottom:6}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <span className="f-label" style={{margin:0}}>Partenaire {i+1}</span>
                <button className="btn-text" type="button" style={{padding:'0 4px'}} onClick={()=>set('sponsors',(d.sponsors||[]).filter((_,j)=>j!==i))}>✕</button>
              </div>
              <FSponsorLogo label="Logo" value={sp.logo||''} onChange={v=>{const n=[...(d.sponsors||[])];n[i]={...n[i],logo:v};set('sponsors',n);}} />
            </div>
          ))}
          <button className="btn-secondary" style={{width:'100%',marginBottom:8}} type="button" onClick={()=>set('sponsors',[...(d.sponsors||[]),{name:'',logo:''}])}>+ Partenaire</button>
          <Sep/>
          <StylePanel d={d} set={set} zones={[
            { key:'bg',          label:'Fond principal',       def: isX ? '#062045' : '#d62127' },
            { key:'headerBg',    label:'Fond header',          def:'rgba(0,0,0,0.28)' },
            { key:'rowHlBg',     label:'Ligne surlignée fond', def:'rgba(255,255,255,0.12)' },
            { key:'rowHlBorder', label:'Ligne surlignée bord', def: isX ? '#FFC702' : '#ffffff' },
            { key:'ptsColor',    label:'Couleur PTS / rang 1', def: isX ? '#FFC702' : '#ffffff' },
            { key:'fg',          label:'Texte principal',      def:'#ffffff' },
          ]} />
        </EdShell>
      );
    }

    /* ── R09 — Résultat de période ── */
    function EdR09({ d, set, onExport, onReset }) {
      const isX = d._team === 'xtreme';
      const activeRoster = isX ? [...XTREME_PLAYERS, ...XTREME_GOALIES] : ROYAL_ROSTER;

      const uN = (side, field, val) => set(side, { ...(d[side]||{}), [field]: val });

      const updateScorer = (i, field, val) => {
        const s = [...(d.scorers||[])]; s[i] = { ...s[i], [field]: val }; set('scorers', s);
      };
      const addScorer    = () => set('scorers', [...(d.scorers||[]), { name:'', goals:1 }]);
      const removeScorer = (i) => set('scorers', (d.scorers||[]).filter((_,j)=>j!==i));

      return (
        <EdShell id="R09" title="Résultat de période" hint="Photo d'action en haut · score + période en bas" onExport={onExport} onReset={onReset}>

          <TeamToggle d={d} set={set}
            xColors={{ bg:'#062045', periodBg:'#FFC702', periodFg:'#062045' }}
            onSwitch={t => {
              uN('home', 'logo', t === 'xtreme' ? XTREME_LOGO : ROYAL_LOGO);

            awayColors={{ bg:'#FFC702', periodBg:'#062045', periodFg:'#FFC702' }}
          />

          <div className="field">
            <Lbl>Période</Lbl>
            <select className="f-select" value={d.period||'2'} onChange={e=>set('period',e.target.value)}>

          <FInput label="Position photo" value={d.photoPosition||''} onChange={v=>set('photoPosition',v)} placeholder="center center" />

          <Sep/>
          <div className="field">
            <Lbl>Équipe locale</Lbl>

          <div className="field">
            <Lbl>Équipe adverse</Lbl>

            <div className="field"><Lbl>Score adverse</Lbl>
              <input className="f-input" type="number" min="0" value={d.awayScore??0}

          <Sep/>
          <div className="field">
            <Lbl>{isX ? 'Buteurs de la période' : 'Buteuses de la période'}</Lbl>

                  <div className="field" style={{margin:0}}>
                    <Lbl>Roster</Lbl>
                    <select className="f-select" style={{fontSize:'0.75rem'}} value=""
                      onChange={e=>{
                        if(!e.target.value) return;
                        const r=activeRoster.find(p=>`${p.firstName} ${p.lastName}`===e.target.value);
                        if(r) updateScorer(i,'name',`${r.firstName.charAt(0)}. ${r.lastName.toUpperCase()}`);
                      }}>
                      <option value="">— Choisir du roster —</option>
                      {activeRoster.map(r=>(
                        <option key={`r09-${i}-${r.num}-${r.lastName}`} value={`${r.firstName} ${r.lastName}`}>
                          {r.num?`#${r.num} `:''}{r.firstName} {r.lastName}
                        </option>
                      ))}
                    </select>
                  </div>
                  <div className="field" style={{margin:0}}>
                    <Lbl>Buts</Lbl>
                    <input className="f-input" type="number" min="1" value={s.goals??1}
                      onChange={e=>updateScorer(i,'goals',+e.target.value)} style={{textAlign:'center'}} />

                  <button className="btn-text" type="button" style={{paddingBottom:4}}

            <button className="btn-text" type="button" onClick={addScorer}>
              + {isX ? 'Buteur' : 'Buteuse'}

          <Sep/>
          <Row2>
            <FInput label="Footer gauche" value={d.footer?.left||''} onChange={v=>set('footer',{...(d.footer||{}),left:v})} />
            <FInput label="Footer droite" value={d.footer?.right||''} onChange={v=>set('footer',{...(d.footer||{}),right:v})} />
          </Row2>
          <Sep/>
          <Lbl>Logos partenaires</Lbl>
          {(d.sponsors||[]).map((sp,i)=>(
            <div key={i} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:10,marginBottom:6}}>

                <span className="f-label" style={{margin:0}}>Partenaire {i+1}</span>

    }

    /* ── R08 — Joueur·euse de la semaine ── */
    function EdR08({ d, set, onExport, onReset }) {
      const isX = d._team === 'xtreme';
      const activeRoster = isX ? [...XTREME_PLAYERS, ...XTREME_GOALIES] : ROYAL_ROSTER;

      const pickPlayer = (fullName) => {
        if (!fullName) return;
        const r = activeRoster.find(p => `${p.firstName} ${p.lastName}` === fullName);
        if (!r) return;
        set('firstName', r.firstName.toUpperCase());
        set('lastName',  r.lastName.toUpperCase());
        set('number',    r.num || '');
        if (r.photo) set('photo', r.photo);
      };

      const updateStat = (i, field, val) => {
        const s = [...(d.stats || [])]; s[i] = { ...s[i], [field]: val }; set('stats', s);
      };

      const updateSponsor = (i, field, val) => {
        const s = [...(d.sponsors || [])]; s[i] = { ...s[i], [field]: val }; set('sponsors', s);
      };
      const addSponsor    = () => set('sponsors', [...(d.sponsors||[]), { name:'', logo:'' }]);
      const removeSponsor = (i) => set('sponsors', (d.sponsors||[]).filter((_,j) => j !== i));

      // Joueurs additionnels (même photo, ex. 2 joueurs du match)
      const updateExtra = (i, field, val) => {
        const a = [...(d.extraPlayers || [])]; a[i] = { ...a[i], [field]: val }; set('extraPlayers', a);
      };
      const pickExtra = (i, fullName) => {
        if (!fullName) return;
        const r = activeRoster.find(p => `${p.firstName} ${p.lastName}` === fullName);
        if (!r) return;
        const a = [...(d.extraPlayers || [])];
        a[i] = { ...a[i], firstName: r.firstName.toUpperCase(), lastName: r.lastName.toUpperCase(), number: r.num || '' };
        set('extraPlayers', a);
      };
      const addExtra    = () => set('extraPlayers', [...(d.extraPlayers||[]), { firstName:'', lastName:'', number:'', position:'' }]);
      const removeExtra = (i) => set('extraPlayers', (d.extraPlayers||[]).filter((_,j) => j !== i));

      return (
        <EdShell id="R08" title="Joueur·euse de la semaine" hint="Photo · texte gauche/droite · Royal ♀ · Xtreme ♂" onExport={onExport} onReset={onReset}>
          <TeamToggle d={d} set={set}
            xColors={{ bg:'#062045', awardFg:'#FFC702', accentBar:'#FFC702' }}
            onSwitch={t=>{ set('eyebrow',t==='xtreme'?'LNHB · XTREME DE SHAWINIGAN':'LNHBF · ROYAL DE SHAWINIGAN'); }}
          />

          {/* Position du texte */}
          <div className="field">
            <Lbl>Position du texte</Lbl>
            <div style={{display:'flex', gap:4}}>
              {[['right','Photo ← | Texte →'],['left','Texte ← | Photo →']].map(([val, label]) => (
                <button key={val} type="button"
                  onClick={() => set('textSide', val)}
                  style={{flex:1, padding:'7px 4px', fontSize:'0.63rem', fontWeight:600,
                    border:`1.5px solid ${(d.textSide||'right')===val ? 'var(--brand)' : 'var(--border)'}`,
                    background:(d.textSide||'right')===val ? 'var(--brand)' : 'transparent',
                    color:(d.textSide||'right')===val ? 'var(--text-hi)' : 'var(--text-mid)',
                    borderRadius:'var(--r)', cursor:'pointer', letterSpacing:'0.02em'}}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Position verticale du texte */}
          <div className="field">
            <Lbl>Position du contenu</Lbl>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:4}}>
              {[
                ['top',    '⬆ Haut'],
                ['upper',  '↑ Haut-centre'],
                ['center', '↕ Centre'],
                ['lower',  '↓ Bas'],
              ].map(([val, label]) => {
                const active = (d.textVAlign||'top') === val;
                return (
                  <button key={val} type="button"
                    onClick={() => set('textVAlign', val)}
                    style={{padding:'7px 4px', fontSize:'0.63rem', fontWeight:600,
                      border:`1.5px solid ${active ? 'var(--brand)' : 'var(--border)'}`,
                      background: active ? 'var(--brand)' : 'transparent',
                      color: active ? 'var(--text-hi)' : 'var(--text-mid)',
                      borderRadius:'var(--r)', cursor:'pointer', letterSpacing:'0.03em'}}>
                    {label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Type de prix */}
          <div className="field">
            <Lbl>Type de prix</Lbl>
            <select className="f-select" value={d.awardType || 'offensif'} onChange={e => set('awardType', e.target.value)}>
              <option value="offensif">{isX ? 'Joueur offensif' : 'Joueuse offensive'}</option>
              <option value="defensif">{isX ? 'Joueur défensif' : 'Joueuse défensive'}</option>
              <option value="match">{isX ? 'Joueur du match' : 'Joueuse du match'}</option>
            </select>
          </div>

          <FInput label="Eyebrow" value={d.eyebrow||''} onChange={v=>set('eyebrow',v)} />
          <Sep/>

          {/* Roster rapide */}
          <div className="field">
            <Lbl>Choisir du roster</Lbl>
            <select className="f-select" value="" onChange={e=>pickPlayer(e.target.value)}>
              <option value="">— Sélectionner —</option>
              {activeRoster.map(r=>(
                <option key={`${r.num}-${r.lastName}`} value={`${r.firstName} ${r.lastName}`}>
                  {r.num ? `#${r.num} ` : ''}{r.firstName} {r.lastName}
                </option>
              ))}
            </select>
          </div>
          <Row2>
            <FInput label="Prénom" value={d.firstName||''} onChange={v=>set('firstName',v)} />
            <FInput label="Nom"    value={d.lastName||''}  onChange={v=>set('lastName',v)} />
          </Row2>
          <Row2>
            <FInput label="Numéro"   value={d.number||''}   onChange={v=>set('number',v)} />
            <FInput label="Position" value={d.position||''} onChange={v=>set('position',v)} />
          </Row2>

          {/* Joueurs additionnels — même photo (ex. 2 joueurs du match) */}
          <div className="field">
            <Lbl>Autres joueurs (même photo)</Lbl>
            {(d.extraPlayers||[]).map((pl,i)=>(
              <div key={i} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:8,marginBottom:6}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span className="f-label" style={{margin:0}}>Joueur {i+2}</span>
                  <button type="button" onClick={()=>removeExtra(i)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-lo)',fontSize:13,padding:0}}>✕</button>
                </div>
                <select className="f-select" style={{marginBottom:4}} value="" onChange={e=>pickExtra(i,e.target.value)}>
                  <option value="">— Choisir du roster —</option>
                  {activeRoster.map(r=>(
                    <option key={`${r.num}-${r.lastName}`} value={`${r.firstName} ${r.lastName}`}>
                      {r.num ? `#${r.num} ` : ''}{r.firstName} {r.lastName}
                    </option>
                  ))}
                </select>
                <Row2>
                  <FInput label="Prénom" value={pl.firstName||''} onChange={v=>updateExtra(i,'firstName',v)} />
                  <FInput label="Nom"    value={pl.lastName||''}  onChange={v=>updateExtra(i,'lastName',v)} />
                </Row2>
                <Row2>
                  <FInput label="Numéro"   value={pl.number||''}   onChange={v=>updateExtra(i,'number',v)} />
                  <FInput label="Position" value={pl.position||''} onChange={v=>updateExtra(i,'position',v)} />
                </Row2>
              </div>
            ))}
            <button className="btn-text" type="button" onClick={addExtra}>+ Ajouter un joueur (même photo)</button>
          </div>

          <FInput label="Contexte (semaine / dates)" value={d.matchContext||''} onChange={v=>set('matchContext',v)} />
          <Sep/>

          {/* Photo */}
          <FImg label="Photo" value={d.photo||''} onChange={v=>set('photo',v)} />
          <FInput label="Position photo (CSS)" value={d.photoPosition||''} onChange={v=>set('photoPosition',v)} placeholder="center top" />
          <Sep/>

          {/* Stats */}
          <div className="field">
            <Lbl>Statistiques</Lbl>
            {(d.stats||[]).map((stat,i)=>(
              <div key={i} style={{display:'grid', gridTemplateColumns:'1fr 1fr 20px', gap:4, marginBottom:4, alignItems:'center'}}>
                <input className="f-input" value={stat.label} placeholder="Label" onChange={e=>updateStat(i,'label',e.target.value)} />
                <input className="f-input" value={stat.value} placeholder="Valeur" onChange={e=>updateStat(i,'value',e.target.value)} />
                <button type="button" onClick={()=>set('stats',(d.stats||[]).filter((_,j)=>j!==i))}
                  style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-lo)',fontSize:13,padding:0}}>✕</button>
              </div>
            ))}
            <button className="btn-text" type="button" onClick={()=>set('stats',[...(d.stats||[]),{label:'STAT',value:'0'}])}>+ Stat</button>
          </div>
          <Sep/>

          <Row2>
            <FInput label="Footer gauche" value={d.footerLeft||''}  onChange={v=>set('footerLeft',v)} />
            <FInput label="Footer droite" value={d.footerRight||''} onChange={v=>set('footerRight',v)} />
          </Row2>
          <Sep/>
          <Lbl>Logos partenaires</Lbl>
          {(d.sponsors||[]).map((sp,i) => (
            <div key={i} style={{background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:'var(--r)', padding:10, marginBottom:6}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
                <span className="f-label" style={{margin:0}}>Partenaire {i+1}</span>
                <button className="btn-text" type="button" style={{padding:'0 4px'}} onClick={()=>removeSponsor(i)}>✕</button>
              </div>
              <FSponsorLogo label="Logo" value={sp.logo||''} onChange={v=>updateSponsor(i,'logo',v)} />
            </div>
          ))}
          <button className="btn-secondary" style={{width:'100%',marginBottom:8}} type="button" onClick={addSponsor}>+ Partenaire</button>
          <Sep/>
          <StylePanel d={d} set={set} zones={[
            { key:'bg',         label:'Fond principal',      def: isX ? '#062045' : '#d62127' },
            { key:'photoBg',    label:'Fond zone photo',     def:'#2a2a2a' },
            { key:'accentBar',  label:'Barre accent',         def: isX ? '#FFC702' : 'rgba(255,255,255,0.30)' },
            { key:'awardFg',    label:'Type de prix couleur', def: isX ? '#FFC702' : '#ffffff' },
            { key:'statBg',     label:'Stats fond',           def:'rgba(0,0,0,0.22)' },
            { key:'statBorder', label:'Stats bordure',        def:'rgba(255,255,255,0.10)' },
            { key:'fg',         label:'Texte principal',      def:'#ffffff' },
          ]} />
        </EdShell>
      );
    }

    /* ── Polices salon ── */
    const SALON_FONTS = [
      { id:'gloock',   label:'Gloock',      serif:"'Gloock', serif",            sans:"'Figtree', sans-serif",      url:null },
      { id:'libre',    label:'Libre Bask.', serif:"'Libre Baskerville', serif", sans:"'Josefin Sans', sans-serif", url:'https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@300;400;600&display=swap' },
      { id:'spectral', label:'Spectral',    serif:"'Spectral', serif",          sans:"'Jost', sans-serif",         url:'https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500&display=swap' },
      { id:'vollkorn', label:'Vollkorn',     serif:"'Vollkorn', serif",          sans:"'Karla', sans-serif",        url:'https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Karla:ital,wght@0,300;0,400;1,400&display=swap' },
    ];
    const __loadedSalonFonts = new Set();
    function loadSalonFont(f) {
      if (!f.url || __loadedSalonFonts.has(f.id)) return;
      __loadedSalonFonts.add(f.id);
      const l = document.createElement('link'); l.rel='stylesheet'; l.href=f.url;
      document.head.appendChild(l);
    }

    /* ── Salon style helper ── */
    function SalonStyle({ d, set }) {
      const currentSerif = d._font || "'Gloock', serif";
      const currentWeight = d._titleWeight || 400;
      const currentLS = d._letterSpacing !== undefined ? d._letterSpacing : 0;
      const btnBase = { flex:1, padding:'7px 4px', borderRadius:4, cursor:'pointer', fontSize:'0.7rem', border:'1px solid var(--brd)' };
      const btnOn  = { ...btnBase, background:'var(--brand)', color:'#fff', borderColor:'var(--brand)' };
      const btnOff = { ...btnBase, background:'var(--bg-input)', color:'var(--text-mid)' };
      return (
        <>
          <Sep/>
          <div className="field">
            <Lbl>Police</Lbl>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:4, marginTop:2}}>
              {SALON_FONTS.map(f => (
                <button key={f.id} onClick={() => { loadSalonFont(f); set('_font',f.serif); set('_fontBody',f.sans); }}
                  style={{ padding:'8px 6px', borderRadius:4, cursor:'pointer', textAlign:'left', lineHeight:1.3,
                    background: currentSerif===f.serif ? 'var(--brand)' : 'var(--bg-input)',
                    color: currentSerif===f.serif ? '#fff' : 'var(--text-mid)',
                    border:'1px solid '+(currentSerif===f.serif ? 'var(--brand)' : 'var(--brd)'),
                  }}>
                  <span style={{fontStyle:'italic', fontSize:'0.8rem'}}>{f.label}</span>
                </button>
              ))}
            </div>
          </div>
          <div className="field">
            <Lbl>Graisse du titre</Lbl>
            <div style={{display:'flex', gap:4}}>
              {[{label:'Léger',value:300},{label:'Normal',value:400},{label:'Gras',value:700}].map(w => (
                <button key={w.value} onClick={() => set('_titleWeight', w.value)}
                  style={currentWeight===w.value ? btnOn : btnOff}>{w.label}</button>
              ))}
            </div>
          </div>
          <div className="field">
            <Lbl>Espacement lettres</Lbl>
            <div style={{display:'flex', alignItems:'center', gap:6}}>
              <input type="range" min="-0.05" max="0.2" step="0.005"
                value={currentLS} onChange={e=>set('_letterSpacing', parseFloat(e.target.value))}
                style={{flex:1}} />
              <span style={{fontSize:'0.65rem', color:'var(--text-mid)', minWidth:38, textAlign:'right'}}>
                {currentLS >= 0 ? '+' : ''}{(currentLS*1000|0)/10} %
              </span>
            </div>
          </div>
          <Sep/>
          <div className="field">
            <Lbl>Fond (couleur)</Lbl>
            <input className="f-input" type="color" value={d._bg || '#fffcfa'} onChange={e=>set('_bg',e.target.value)} style={{width:48,height:28,padding:0,cursor:'pointer'}} />
          </div>
          <FImg label="Image de fond" value={d._bgImage||''} onChange={v=>set('_bgImage',v)} />
          <Row2>
            <div className="field">
              <Lbl>Fondu couleur</Lbl>
              <input className="f-input" type="color" value={d._overlayColor || '#000000'} onChange={e=>set('_overlayColor',e.target.value)} style={{width:48,height:28,padding:0,cursor:'pointer'}} />
            </div>
            <div className="field">
              <Lbl>Fondu opacité</Lbl>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <input type="range" min="0" max="1" step="0.05" value={d._overlayOpacity !== undefined ? d._overlayOpacity : 0} onChange={e=>set('_overlayOpacity',parseFloat(e.target.value))} style={{flex:1}} />
                <span style={{fontSize:'0.65rem',color:'var(--text-mid)',minWidth:26,textAlign:'right'}}>{Math.round((d._overlayOpacity||0)*100)}%</span>
              </div>
            </div>
          </Row2>
          <div className="field">
            <Lbl>Texte</Lbl>
            <input className="f-input" type="color" value={d._fg || '#2c1f1c'} onChange={e=>set('_fg',e.target.value)} style={{width:48,height:28,padding:0,cursor:'pointer'}} />
          </div>
          <div className="field">
            <Lbl>Accent</Lbl>
            <input className="f-input" type="color" value={d._accent || '#f8cbca'} onChange={e=>set('_accent',e.target.value)} style={{width:48,height:28,padding:0,cursor:'pointer'}} />
          </div>
          <div className="field">

    function EdE10B({ d, set, onExport, onReset }) {
      const [lotText, setLotText] = useState('');
      const [batchProgress, setBatchProgress] = useState(null);

      const quotes = lotText.split('\n')
        .map(l => l.replace(/^\d+\.\s*/, '').trim())
        .filter(Boolean);

      const handleBatchExport = async () => {
        if (!quotes.length || batchProgress) return;
        setBatchProgress({ done: 0, total: quotes.length });
        try {
          await exportBatchE10B(quotes, d, (done, total) => setBatchProgress({ done, total }));
        } finally {
          setBatchProgress(null);
        }
      };

      return (
        <EdShell id="E10B" title="Secret B · Carnet" hint="Dicton sur fond blush" onExport={onExport} onReset={onReset}>
          <FInput label="Eyebrow" value={d.eyebrow||''} onChange={v=>set('eyebrow',v)} />
          <FArea label="Citation" value={d.quote||''} onChange={v=>set('quote',v)} />
          <Row2>
            <FInput label="Auteur" value={d.author||''} onChange={v=>set('author',v)} />
            <FInput label="Rôle" value={d.role||''} onChange={v=>set('role',v)} />
          </Row2>
          <SalonStyle d={d} set={set} />
          <Sep/>
          <div className="field">
            <Lbl>Export en lot</Lbl>
            <textarea
              className="f-input"
              rows={8}
              placeholder={"Colle tes secrets ici, un par ligne.\n\n1. Saviez-vous que...\n2. Saviez-vous que...\n\nLes numéros de liste sont retirés automatiquement. Le texte est conservé tel quel."}
              value={lotText}
              onChange={e => setLotText(e.target.value)}
              style={{resize:'vertical',lineHeight:1.5,fontSize:'0.78rem',fontFamily:'monospace'}}
            />
            {quotes.length > 0 && (
              <div style={{fontSize:'0.7rem',color:'var(--text-mid)',marginTop:4}}>
                {quotes.length} secret{quotes.length > 1 ? 's' : ''} détecté{quotes.length > 1 ? 's' : ''}
              </div>
            )}
          </div>
          <div className="field">
            <label style={{display:'flex',alignItems:'center',gap:6,fontSize:'0.75rem',color:'var(--text-mid)',cursor:'pointer'}}>
              <input type="checkbox" checked={d._lotNumbered !== false} onChange={e=>set('_lotNumbered',e.target.checked)} />
              Numéroter le eyebrow (#01, #02…)
            </label>
          </div>
          <FInput label="Préfixe eyebrow lot" value={d._lotEyebrow !== undefined ? d._lotEyebrow : (d.eyebrow||'')} onChange={v=>set('_lotEyebrow',v)} />
          <button
            className="btn-primary"
            style={{width:'100%',marginTop:4,opacity:(!quotes.length||batchProgress)?0.5:1}}
            disabled={!quotes.length||!!batchProgress}
            onClick={handleBatchExport}
            type="button"
          >
            {batchProgress
              ? `Export… ${batchProgress.done} / ${batchProgress.total}`
              : `Exporter le lot (${quotes.length || 0})`}
          </button>
        </EdShell>
      );
    }
