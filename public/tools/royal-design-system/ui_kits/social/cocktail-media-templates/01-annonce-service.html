<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<style>
/* FONTS_PLACEHOLDER */

:root {
  --primary: #e83b14;
  --dark: #2b2b2b;
  --base: #FAF7F3;
  --secondary: #9a9490;
  --border: #e0d9d3;
  --white: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  overflow: hidden;
  background: var(--base);
}

.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.accent-bar {
  width: 100%;
  height: 6px;
  background: var(--primary);
  flex-shrink: 0;
}

.visual-area {
  flex: 1;
  padding: 40px 40px 20px 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mockup-frame {
  width: 100%;
  height: 100%;
  background: var(--white);
  border-radius: 24px;
  box-shadow: 0 40px 60px rgba(43, 43, 43, 0.06);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mockup-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.placeholder-text {
  color: var(--border);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.banner {
  background: var(--dark);
  padding: 36px 48px 40px 48px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  min-height: 260px;
  flex-shrink: 0;
  border-radius: 32px 32px 0 0;
}

.banner-content {
  flex: 1;
  padding-right: 32px;
}

.banner-tag {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 10px;
}

.banner-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 68px;
  line-height: 0.95;
  color: var(--white);
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.banner-subtitle {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 17px;
  color: var(--secondary);
  font-weight: 400;
  line-height: 1.5;
}

.banner-logo {
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
}

.banner-logo img {
  height: 80px;
}
</style>
</head>
<body>
<div class="container">
  <div class="accent-bar"></div>

  <div class="visual-area">
    <div class="mockup-frame">
      <!-- VARIABLE: IMAGE -->
      <span class="placeholder-text">[ Image / Screenshot ]</span>
    </div>
  </div>

  <div class="banner">
    <div class="banner-content">
      <!-- VARIABLE: TAG -->
      <div class="banner-tag">Cocktail Média</div>
      <!-- VARIABLE: TITRE -->
      <div class="banner-title">PHOTO CORPORATIVE</div>
      <!-- VARIABLE: SOUS-TITRE -->
      <div class="banner-subtitle">Des portraits professionnels qui reflètent votre image.</div>
    </div>
    <div class="banner-logo">
      <img src="{{LOGO_CM_ICON_WHITE}}" alt="Cocktail Média" />
    </div>
  </div>
</div>
</body>
</html>
