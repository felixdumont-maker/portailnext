<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<style>
/* FONTS_PLACEHOLDER */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  overflow: hidden;
  background: #2b2b2b;
}

.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.top-bar {
  padding: 60px 56px 0 56px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.logo img {
  height: 44px;
}

.tag {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #e83b14;
  border: 2px solid rgba(232, 59, 20, 0.3);
  padding: 8px 20px;
  border-radius: 100px;
}

.visual-area {
  flex: 1;
  padding: 40px 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.image-frame {
  width: 100%;
  height: 100%;
  border-radius: 28px;
  overflow: hidden;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
}

.image-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.placeholder {
  color: #444;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.bottom-section {
  padding: 0 56px 72px 56px;
  flex-shrink: 0;
}

.bottom-tag {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #e83b14;
  margin-bottom: 12px;
}

.bottom-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 72px;
  color: #ffffff;
  letter-spacing: 2px;
  line-height: 0.92;
  margin-bottom: 16px;
}

.bottom-subtitle {
  font-size: 18px;
  color: #9a9490;
  line-height: 1.5;
  max-width: 700px;
}

.accent-bar {
  width: 100%;
  height: 6px;
  background: #e83b14;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="logo">
      <img src="{{LOGO_CM_ICON_WHITE}}" alt="Cocktail Média" />
    </div>
    <!-- VARIABLE: TAG -->
    <div class="tag">Nouveau</div>
  </div>

  <div class="visual-area">
    <div class="image-frame">
      <!-- VARIABLE: IMAGE -->
      <span class="placeholder">[ Image / Vidéo ]</span>
    </div>
  </div>

  <div class="bottom-section">
    <!-- VARIABLE: TAG BAS -->
    <div class="bottom-tag">Cocktail Média</div>
    <!-- VARIABLE: TITRE -->
    <div class="bottom-title">VOTRE IMAGE<br/>MÉRITE MIEUX</div>
    <!-- VARIABLE: SOUS-TITRE -->
    <div class="bottom-subtitle">Photo · Vidéo · Web · Design</div>
  </div>

  <div class="accent-bar"></div>
</div>
</body>
</html>
