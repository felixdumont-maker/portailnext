<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div class="tex-bg" style="border-radius:14px; padding:18px 22px; color:#fff; display:flex; gap:18px; align-items:flex-end;">
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="font-family:'Bebas Neue'; font-size:100px; letter-spacing:-0.02em; line-height:0.88; text-shadow:0 4px 16px rgba(0,0,0,0.30);">4</div>
      <div style="font-family:monospace; font-size:9px; color:rgba(255,255,255,0.65);">100px · score win</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="font-family:'Bebas Neue'; font-size:52px; line-height:1; letter-spacing:0.04em;">RYL</div>
      <div style="font-family:monospace; font-size:9px; color:rgba(255,255,255,0.65);">52px · sigle</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="font-family:'Bebas Neue'; font-size:32px; line-height:1; letter-spacing:0.06em;">19H30</div>
      <div style="font-family:monospace; font-size:9px; color:rgba(255,255,255,0.65);">30px · time</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="font-family:'Bebas Neue'; font-size:22px; line-height:1; letter-spacing:0.08em;">SAM 26</div>
      <div style="font-family:monospace; font-size:9px; color:rgba(255,255,255,0.65);">22px · day</div>
    </div>
  </div>
  <div class="eyebrow">Display scale — 100 / 52 / 38 / 32 / 30 / 28 / 26 / 22px. All Bebas Neue, always uppercase.</div>
</div>
</body></html>
