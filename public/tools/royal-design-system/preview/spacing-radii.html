<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div style="background:#fff; border:1px solid #e8e2d6; border-radius:12px; padding:18px; display:grid; grid-template-columns:repeat(5,1fr); gap:14px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:60px; height:60px; background:#d62127; border-radius:11px;"></div>
      <div style="font-family:monospace; font-size:10px;">11px</div>
      <div style="font-size:8px; color:rgba(0,0,0,0.5); text-align:center;">--r-tile<br>partner logo</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:60px; height:60px; background:#d62127; border-radius:14px;"></div>
      <div style="font-family:monospace; font-size:10px;">14px</div>
      <div style="font-size:8px; color:rgba(0,0,0,0.5); text-align:center;">--r-logo<br>team logo box</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:60px; height:60px; background:#d62127; border-radius:16px;"></div>
      <div style="font-family:monospace; font-size:10px;">16px</div>
      <div style="font-size:8px; color:rgba(0,0,0,0.5); text-align:center;">--r-card<br>game card</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:60px; height:60px; background:#d62127; border-radius:20px;"></div>
      <div style="font-family:monospace; font-size:10px;">20px</div>
      <div style="font-size:8px; color:rgba(0,0,0,0.5); text-align:center;">--r-card-lg<br>match result</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="width:90px; height:30px; background:#d62127; border-radius:100px;"></div>
      <div style="font-family:monospace; font-size:10px;">100px</div>
      <div style="font-size:8px; color:rgba(0,0,0,0.5); text-align:center;">--r-pill<br>pills, badges</div>
    </div>
  </div>
  <div class="eyebrow">RADII · 11 / 14 / 16 / 20 / 100. Larger object → larger radius.</div>
</div>
</body></html>
