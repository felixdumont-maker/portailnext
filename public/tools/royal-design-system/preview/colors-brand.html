<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div class="row" style="gap:10px;">
    <div class="swatch tex-bg" style="flex:2; min-height:140px; color:#fff;">
      <div class="swatch-name" style="color:rgba(255,255,255,0.7); letter-spacing:0.3em; font-size:9px;">— ROYAL RED · BRAND CORE</div>
      <div>
        <div style="font-family:'Bebas Neue'; font-size:42px; letter-spacing:0.06em; line-height:1;">#D62127</div>
        <div class="swatch-meta" style="opacity:0.7; margin-top:4px;">--royal-red &nbsp;·&nbsp; full-bleed background</div>
      </div>
    </div>
    <div class="col" style="flex:1; gap:10px;">
      <div class="swatch" style="background:#c0191a; color:#fff; min-height:65px;">
        <div class="swatch-name" style="opacity:0.7; font-size:10px; letter-spacing:0.2em;">DEEP</div>
        <div class="swatch-meta">#C0191A</div>
      </div>
      <div class="swatch" style="background:#9e1216; color:#fff; min-height:65px;">
        <div class="swatch-name" style="opacity:0.7; font-size:10px; letter-spacing:0.2em;">DARKER</div>
        <div class="swatch-meta">#9E1216</div>
      </div>
    </div>
  </div>
  <div class="eyebrow" style="margin-top:2px;">One color does the work — every red surface gets the −55° hatch.</div>
</div>
</body></html>
