<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
    <div style="background:#fff; border:1px solid #e8e2d6; border-radius:12px; padding:18px;">
      <div style="font-family:'Bebas Neue'; font-size:50px; letter-spacing:0.04em; line-height:0.95; color:#d62127;">BEBAS NEUE</div>
      <div style="font-family:'Bebas Neue'; font-size:18px; letter-spacing:0.16em; margin-top:8px; color:#1a1a1a;">DISPLAY · ALL CAPS</div>
      <div style="font-size:10px; font-family:monospace; color:rgba(0,0,0,0.55); margin-top:10px;">google fonts → 'Bebas Neue'</div>
      <div style="font-size:9px; color:rgba(0,0,0,0.45); margin-top:2px;">Headlines, scores, dates, pills</div>
    </div>
    <div style="background:#fff; border:1px solid #e8e2d6; border-radius:12px; padding:18px;">
      <div style="font-family:'Plus Jakarta Sans'; font-size:30px; font-weight:800; line-height:1; color:#d62127;">Plus Jakarta</div>
      <div style="font-family:'Plus Jakarta Sans'; font-size:14px; font-weight:600; margin-top:8px; color:#1a1a1a;">UI · 400 / 500 / 600 / 700 / 800</div>
      <div style="font-size:10px; font-family:monospace; color:rgba(0,0,0,0.55); margin-top:10px;">google fonts → 'Plus Jakarta Sans'</div>
      <div style="font-size:9px; color:rgba(0,0,0,0.45); margin-top:2px;">Eyebrows, labels, micro-copy</div>
    </div>
  </div>
  <div class="eyebrow">Two-family system. No fallback to system fonts in production exports.</div>
</div>
</body></html>
