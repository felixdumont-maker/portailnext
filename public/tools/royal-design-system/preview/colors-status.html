<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div class="tex-bg" style="border-radius:14px; padding:20px; display:flex; gap:18px; align-items:center; justify-content:space-around;">
    <div style="text-align:center;">
      <div style="font-family:'Bebas Neue'; font-size:88px; letter-spacing:-0.02em; color:#fff; text-shadow:0 4px 16px rgba(0,0,0,0.30); line-height:1;">4</div>
      <div style="margin-top:8px; font-family:'Bebas Neue'; font-size:13px; letter-spacing:0.21em; padding:4px 14px; border-radius:100px; background:#fff; color:#d62127; display:inline-block;">VICTOIRE</div>
      <div style="margin-top:8px; font-size:9px; font-family:monospace; color:rgba(255,255,255,0.7);">#FFFFFF · score</div>
    </div>
    <div style="width:1px; height:90px; background:rgba(255,255,255,0.15);"></div>
    <div style="text-align:center;">
      <div style="font-family:'Bebas Neue'; font-size:88px; letter-spacing:-0.02em; color:rgba(255,255,255,0.20); line-height:1;">2</div>
      <div style="margin-top:8px; font-family:'Bebas Neue'; font-size:13px; letter-spacing:0.21em; padding:4px 14px; border-radius:100px; background:rgba(255,255,255,0.10); color:rgba(255,255,255,0.50); border:1px solid rgba(255,255,255,0.15); display:inline-block;">DÉFAITE</div>
      <div style="margin-top:8px; font-size:9px; font-family:monospace; color:rgba(255,255,255,0.7);">white/.20 · score</div>
    </div>
  </div>
  <div class="eyebrow">Win vs loss. No green/red — pure white = victory, transparent white = defeat.</div>
</div>
</body></html>
