<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div class="tex-bg" style="border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:9px;">
    <!-- Home (dark) game card -->
    <div style="display:flex; align-items:stretch; border-radius:16px; overflow:hidden; background:rgba(0,0,0,0.22); border:1px solid rgba(0,0,0,0.20); height:78px;">
      <div style="width:80px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; border-right:1px solid rgba(255,255,255,0.12); gap:2px;">
        <div style="font-family:'Bebas Neue'; font-size:24px; color:#fff; letter-spacing:0.08em; line-height:1;">MAR</div>
        <div style="font-size:10px; font-weight:600; color:rgba(255,255,255,0.45); letter-spacing:0.05em;">22 AVR.</div>
      </div>
      <div style="display:flex; align-items:center; gap:10px; padding:0 16px; flex:1;">
        <div style="width:42px; height:42px; border-radius:9px; background:rgba(255,255,255,0.10); border:1px dashed rgba(255,255,255,0.25);"></div>
        <div style="font-family:'Bebas Neue'; font-size:13px; color:rgba(255,255,255,0.30); letter-spacing:0.12em;">VS</div>
        <div style="width:42px; height:42px; border-radius:9px; background:rgba(255,255,255,0.10); border:1px dashed rgba(255,255,255,0.25);"></div>
        <div style="margin-left:6px;">
          <div style="font-family:'Bebas Neue'; font-size:22px; color:#fff; letter-spacing:0.08em; line-height:1;">RYL <span style="color:rgba(255,255,255,0.55);">vs</span> QBC</div>
          <div style="font-size:10px; color:rgba(255,255,255,0.40);">Centre Bionest · Shawinigan</div>
        </div>
      </div>
      <div style="width:108px; flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; justify-content:center; padding:0 16px 0 6px; gap:5px;">
        <div style="font-family:'Bebas Neue'; font-size:24px; color:#fff; letter-spacing:0.06em; line-height:1; text-shadow:2px 2px 0 rgba(0,0,0,0.15);">19H00</div>
        <div style="font-size:8px; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; padding:2px 9px; border-radius:100px; background:rgba(0,0,0,0.25); color:rgba(255,255,255,0.6); border:1px solid rgba(0,0,0,0.20);">HOME</div>
      </div>
    </div>
    <!-- Away (light) game card -->
    <div style="display:flex; align-items:stretch; border-radius:16px; overflow:hidden; background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.15); height:78px;">
      <div style="width:80px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; border-right:1px solid rgba(255,255,255,0.12); gap:2px;">
        <div style="font-family:'Bebas Neue'; font-size:24px; color:#fff; letter-spacing:0.08em; line-height:1;">SAM</div>
        <div style="font-size:10px; font-weight:600; color:rgba(255,255,255,0.45);">26 AVR.</div>
      </div>
      <div style="display:flex; align-items:center; gap:10px; padding:0 16px; flex:1;">
        <div style="width:42px; height:42px; border-radius:9px; background:rgba(255,255,255,0.10); border:1px dashed rgba(255,255,255,0.25);"></div>
        <div style="font-family:'Bebas Neue'; font-size:13px; color:rgba(255,255,255,0.30); letter-spacing:0.12em;">VS</div>
        <div style="width:42px; height:42px; border-radius:9px; background:rgba(255,255,255,0.10); border:1px dashed rgba(255,255,255,0.25);"></div>
        <div style="margin-left:6px;">
          <div style="font-family:'Bebas Neue'; font-size:22px; color:#fff; letter-spacing:0.08em; line-height:1;">MTL <span style="color:rgba(255,255,255,0.55);">vs</span> RYL</div>
          <div style="font-size:10px; color:rgba(255,255,255,0.40);">Complexe Sportif MTL</div>
        </div>
      </div>
      <div style="width:108px; flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; justify-content:center; padding:0 16px 0 6px; gap:5px;">
        <div style="font-family:'Bebas Neue'; font-size:24px; color:#fff; letter-spacing:0.06em; line-height:1; text-shadow:2px 2px 0 rgba(0,0,0,0.15);">19H30</div>
        <div style="font-size:8px; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; padding:2px 9px; border-radius:100px; background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.18);">AWAY</div>
      </div>
    </div>
  </div>
  <div class="eyebrow">SCHEDULE CARDS · Dark surface = home game, light = away. Day-column · matchup · time.</div>
</div>
</body></html>
