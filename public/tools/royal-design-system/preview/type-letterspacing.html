<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div class="tex-bg" style="border-radius:14px; padding:18px; color:#fff; display:flex; flex-direction:column; gap:10px;">
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="font-family:'Bebas Neue'; font-size:18px; letter-spacing:0.21em; padding:8px 22px; border-radius:100px; background:#fff; color:#d62127;">SOIR DE MATCH</div>
      <div style="font-family:monospace; font-size:9px; color:rgba(255,255,255,0.6);">--ls-pill · 0.21em (~4px @ 19px)</div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;">LNHBF · SAISON 2025–2026</div>
      <div style="font-family:monospace; font-size:9px; color:rgba(255,255,255,0.6);">--ls-meta · 0.18em (~2px @ 11px)</div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="font-size:9px; font-weight:700; letter-spacing:0.42em; text-transform:uppercase; color:rgba(255,255,255,0.55);">— ROYAL · SHAWINIGAN —</div>
      <div style="font-family:monospace; font-size:9px; color:rgba(255,255,255,0.6);">--ls-eyebrow · 0.42em (~5px @ 9px)</div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="font-family:'Bebas Neue'; font-size:48px; letter-spacing:-0.02em; line-height:1;">100</div>
      <div style="font-family:monospace; font-size:9px; color:rgba(255,255,255,0.6);">--ls-tight · -0.02em (giant scores only)</div>
    </div>
  </div>
  <div class="eyebrow">Letter-spacing is half the personality. Tight on numbers, loose on labels.</div>
</div>
</body></html>
