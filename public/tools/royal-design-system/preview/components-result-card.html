<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div class="tex-bg" style="border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:10px;">
    <!-- Win card -->
    <div style="border-radius:20px; border:1.5px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.18); position:relative; overflow:hidden; padding:14px 28px 14px 34px;">
      <div style="position:absolute; left:0; top:0; bottom:0; width:6px; background:#fff;"></div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
        <div style="font-size:9px; font-weight:700; letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.40);">MATCH RÉG · CENTRE BIONEST</div>
        <div style="font-family:'Bebas Neue'; font-size:13px; letter-spacing:0.21em; padding:3px 12px; border-radius:100px; background:#fff; color:#d62127;">VICTOIRE</div>
      </div>
      <div style="display:flex; align-items:center; gap:0;">
        <div style="display:flex; align-items:center; gap:14px; flex:1;">
          <div style="width:48px; height:48px; border-radius:11px; background:rgba(255,255,255,0.10); border:1px dashed rgba(255,255,255,0.25);"></div>
          <div>
            <div style="font-family:'Bebas Neue'; font-size:20px; letter-spacing:0.06em; color:#fff;">RYL</div>
            <div style="font-size:9px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.45);">SHAWINIGAN</div>
          </div>
        </div>
        <div style="display:flex; align-items:center; gap:6px; padding:0 14px;">
          <div style="font-family:'Bebas Neue'; font-size:62px; line-height:0.88; color:#fff; text-shadow:0 4px 16px rgba(0,0,0,0.30);">4</div>
          <div style="font-family:'Bebas Neue'; font-size:30px; color:rgba(255,255,255,0.15);">—</div>
          <div style="font-family:'Bebas Neue'; font-size:62px; line-height:0.88; color:rgba(255,255,255,0.20);">2</div>
        </div>
        <div style="display:flex; align-items:center; gap:14px; flex-direction:row-reverse; flex:1;">
          <div style="width:48px; height:48px; border-radius:11px; background:rgba(255,255,255,0.10); border:1px dashed rgba(255,255,255,0.25);"></div>
          <div style="text-align:right;">
            <div style="font-family:'Bebas Neue'; font-size:20px; letter-spacing:0.06em; color:rgba(255,255,255,0.55);">MTL</div>
            <div style="font-size:9px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.30);">MONTRÉAL</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="eyebrow">RESULT CARD · Left-accent bar (6px white = win), translucent black surface, score hierarchy by opacity.</div>
</div>
</body></html>
