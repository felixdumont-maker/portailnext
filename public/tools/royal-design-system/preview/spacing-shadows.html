<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div style="background:#fff; border:1px solid #e8e2d6; border-radius:12px; padding:18px; display:flex; flex-direction:column; gap:18px;">
    <div style="display:flex; align-items:center; gap:18px;">
      <div style="font-family:'Bebas Neue'; font-size:54px; line-height:0.9; letter-spacing:0.04em; color:#d62127; text-shadow:2px 2px 0 rgba(0,0,0,0.20);">PRESS<br>SHADOW</div>
      <div>
        <div style="font-family:monospace; font-size:11px; color:#1a1a1a;">2px 2px 0 rgba(0,0,0,0.20)</div>
        <div style="font-size:9px; color:rgba(0,0,0,0.5); margin-top:3px;">Hard offset · "screenprint" feel · Hero titles only</div>
      </div>
    </div>
    <div style="height:1px; background:#e8e2d6;"></div>
    <div style="display:flex; align-items:center; gap:18px; background:#d62127; padding:12px 16px; border-radius:8px;">
      <div style="font-family:'Bebas Neue'; font-size:54px; line-height:1; color:#fff; text-shadow:0 4px 16px rgba(0,0,0,0.30);">4</div>
      <div>
        <div style="font-family:monospace; font-size:11px; color:#fff;">0 4px 16px rgba(0,0,0,0.30)</div>
        <div style="font-size:9px; color:rgba(255,255,255,0.7); margin-top:3px;">Soft lift · Win scores only · Suggests trophy weight</div>
      </div>
    </div>
  </div>
  <div class="eyebrow">SHADOWS · Two flavors. Hard 2px offset for headlines, soft 16px blur for the hero score.</div>
</div>
</body></html>
