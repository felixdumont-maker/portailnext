<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div class="tex-bg" style="border-radius:14px; padding:18px;">
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
      <div style="background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.30); border-radius:14px; padding:14px; min-height:100px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; letter-spacing:0.3em; color:#fff; font-weight:700;">LIGHT — FEATURED</div>
        <div style="font-size:9px; font-family:monospace; color:rgba(255,255,255,0.8);">white / .18</div>
      </div>
      <div style="background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.30); border-radius:14px; padding:14px; min-height:100px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; letter-spacing:0.3em; color:#fff; font-weight:700;">MID — LOGO BOX</div>
        <div style="font-size:9px; font-family:monospace; color:rgba(255,255,255,0.8);">white / .12</div>
      </div>
      <div style="background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.15); border-radius:14px; padding:14px; min-height:100px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; letter-spacing:0.3em; color:#fff; font-weight:700;">LOW — NEUTRAL CARD</div>
        <div style="font-size:9px; font-family:monospace; color:rgba(255,255,255,0.8);">white / .10</div>
      </div>
      <div style="background:rgba(0,0,0,0.22); border:1px solid rgba(0,0,0,0.20); border-radius:14px; padding:14px; min-height:100px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; letter-spacing:0.3em; color:#fff; font-weight:700;">DARK — HOME ALT</div>
        <div style="font-size:9px; font-family:monospace; color:rgba(255,255,255,0.7);">black / .22</div>
      </div>
      <div style="background:rgba(0,0,0,0.30); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.15); border-radius:14px; padding:14px; min-height:100px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; letter-spacing:0.3em; color:#fff; font-weight:700;">GLASS — INFO STRIP</div>
        <div style="font-size:9px; font-family:monospace; color:rgba(255,255,255,0.7);">black / .30 + blur(12)</div>
      </div>
      <div style="background:radial-gradient(ellipse at bottom right, rgba(0,0,0,0.45) 0%, transparent 70%); border-radius:14px; padding:14px; min-height:100px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; letter-spacing:0.3em; color:#fff; font-weight:700;">VIGNETTE CORNER</div>
        <div style="font-size:9px; font-family:monospace; color:rgba(255,255,255,0.7);">radial → BR · 0.45</div>
      </div>
    </div>
  </div>
  <div class="eyebrow">Translucent surfaces. Always layered over the red-on-hatch base — never on a flat color.</div>
</div>
</body></html>
