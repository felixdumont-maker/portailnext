<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
    <div style="border-radius:12px; height:130px; position:relative; overflow:hidden;
      background-color:#d62127;
      background-image: repeating-linear-gradient(-55deg, transparent 0, transparent 60px, rgba(0,0,0,0.04) 60px, rgba(0,0,0,0.04) 120px);">
      <div style="position:absolute; bottom:8px; left:10px; font-family:monospace; font-size:9px; color:#fff; opacity:0.85;">−55° hatch · 60+60</div>
      <div style="position:absolute; top:8px; right:10px; font-size:8px; letter-spacing:0.2em; color:#fff; font-weight:700;">SIGNATURE</div>
    </div>
    <div style="border-radius:12px; height:130px; position:relative; overflow:hidden; background:#d62127;">
      <div style="position:absolute; bottom:0; right:0; width:65%; height:65%; background:radial-gradient(ellipse at bottom right, rgba(0,0,0,0.55) 0%, transparent 75%);"></div>
      <div style="position:absolute; bottom:8px; left:10px; font-family:monospace; font-size:9px; color:#fff; opacity:0.85;">Vignette corner</div>
    </div>
    <div style="border-radius:12px; height:130px; position:relative; overflow:hidden;
      background:linear-gradient(to bottom, rgba(192,25,26,0.20) 0%, #d62127 100%), linear-gradient(135deg, #6a1418 0%, #d62127 100%);">
      <div style="position:absolute; bottom:8px; left:10px; font-family:monospace; font-size:9px; color:#fff; opacity:0.85;">Photo → fade</div>
    </div>
  </div>
  <div class="eyebrow">BACKGROUND TREATMENTS · Diagonal hatch · Vignette corner · Photo-to-red fade. Always layered, never plain.</div>
</div>
</body></html>
