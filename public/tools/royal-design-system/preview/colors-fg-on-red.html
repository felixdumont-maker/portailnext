<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-wrap">
  <div class="tex-bg" style="border-radius:14px; padding:18px;">
    <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:10px;">
      <div style="background:#ffffff; border-radius:8px; padding:10px; min-height:90px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; font-weight:700; letter-spacing:0.2em; color:rgba(0,0,0,0.5);">FG/PRIMARY</div>
        <div>
          <div style="font-family:'Bebas Neue'; font-size:22px; letter-spacing:0.06em; color:#d62127;">100%</div>
          <div style="font-size:9px; font-family:monospace; color:rgba(0,0,0,0.5);">#FFFFFF</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.55); border-radius:8px; padding:10px; min-height:90px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; font-weight:700; letter-spacing:0.2em; color:rgba(0,0,0,0.55);">SECONDARY</div>
        <div>
          <div style="font-family:'Bebas Neue'; font-size:22px; letter-spacing:0.06em; color:#fff;">55%</div>
          <div style="font-size:9px; font-family:monospace; color:rgba(0,0,0,0.5);">white/.55</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.45); border-radius:8px; padding:10px; min-height:90px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; font-weight:700; letter-spacing:0.2em; color:rgba(0,0,0,0.55);">TERTIARY</div>
        <div>
          <div style="font-family:'Bebas Neue'; font-size:22px; letter-spacing:0.06em; color:#fff;">45%</div>
          <div style="font-size:9px; font-family:monospace; color:rgba(0,0,0,0.5);">white/.45</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.30); border-radius:8px; padding:10px; min-height:90px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; font-weight:700; letter-spacing:0.2em; color:rgba(255,255,255,0.85);">MUTED</div>
        <div>
          <div style="font-family:'Bebas Neue'; font-size:22px; letter-spacing:0.06em; color:#fff;">30%</div>
          <div style="font-size:9px; font-family:monospace; color:rgba(255,255,255,0.85);">white/.30</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.20); border-radius:8px; padding:10px; min-height:90px; display:flex; flex-direction:column; justify-content:space-between;">
        <div style="font-size:9px; font-weight:700; letter-spacing:0.2em; color:#fff;">FAINT / LOSS</div>
        <div>
          <div style="font-family:'Bebas Neue'; font-size:22px; letter-spacing:0.06em; color:#fff;">20%</div>
          <div style="font-size:9px; font-family:monospace; color:#fff;">white/.20</div>
        </div>
      </div>
    </div>
  </div>
  <div class="eyebrow">Foreground hierarchy — pure white + 4 transparent steps. Saturation, not hue, signals state.</div>
</div>
</body></html>
